<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AngloRoom - Registration</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&family=Outfit:wght@900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base: #022c22;
      --accent: #10b981;
      --glass: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.08);
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-base);
      font-family: 'Plus Jakarta Sans', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Ambient Glow Background */
    body::before {
      content: ''; position: fixed; top: -10%; left: -10%; width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(16,185,129,0.1) 0%, transparent 70%);
      filter: blur(100px); z-index: -1;
    }

    .container {
      width: 95%;
      max-width: 900px;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 40px;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
      margin: 40px 0;
    }

    .header-area {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .logo {
      font-family: 'Outfit', sans-serif;
      font-size: 28px;
      font-weight: 900;
      background: linear-gradient(135deg, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .back-btn {
      text-decoration: none;
      color: #94a3b8;
      font-weight: 600;
      font-size: 14px;
      padding: 10px 20px;
      border-radius: 50px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      transition: 0.3s;
    }

    .back-btn:hover {
      color: #fff;
      border-color: var(--accent);
      transform: translateX(-5px);
    }

    /* Form Container */
    .form-wrapper {
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.02);
    }

    iframe {
      display: block;
      width: 100%;
      height: 900px;
      border: none;
    }

    @media (max-width: 600px) {
      .container { padding: 20px; border-radius: 20px; }
      .logo { font-size: 22px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header-area">
      <div class="logo">AngloRoom</div>
      <a href="index.html" class="back-btn">← Back to Home</a>
    </div>

    <div class="form-wrapper">
      <iframe src="https://madisongroup.s20.online/common/1/form/draw?id=1&amp;baseColor=1f7a4a&amp;borderRadius=8&amp;background-color:transparent&amp;css=%2F%2Fcdn.alfacrm.pro%2Flead-form%2Fform.css" frameborder="0"></iframe>
    </div>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="uz">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
  <title>AngloRoom</title>

  <style>
    :root {
      --bg-base: #022c22;      /* Deep premium green/black */
      --accent: #10b981;       /* Neon emerald */
      --accent-glow: rgba(16, 185, 129, 0.4);
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    /* ===== RESET & BASE ===== */
    html { scroll-behavior: smooth; }
    
    html, body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      background-color: var(--bg-base);
      color: var(--text-main);
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      line-height: 1.6;
    }

    /* ===== BACKGROUND GLOWS ===== */
    body::before {
      content: '';
      position: fixed;
      top: -20%; left: -10%; width: 50vw; height: 50vw;
      background: radial-gradient(circle, rgba(16,185,129,0.15) 0%, transparent 70%);
      filter: blur(100px); z-index: -2; pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -20%; right: -10%; width: 50vw; height: 50vw;
      background: radial-gradient(circle, rgba(5,150,105,0.15) 0%, transparent 70%);
      filter: blur(100px); z-index: -2; pointer-events: none;
    }

    /* ===== FLOATING HEADER ===== */
    header {
      background: rgba(2, 44, 34, 0.7);
      backdrop-filter: blur(20px);
      
      border: 1px solid var(--glass-border);
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 20px;
      z-index: 1000;
      max-width: 1200px;
      margin: 0 auto;
      border-radius: 100px; /* Floating Pill shape */
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      transition: all 0.3s ease;
    }

    .logo {
      font-family: 'Outfit', sans-serif;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #fff, var(--accent));
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    nav { display: flex; gap: 32px; align-items: center; }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: -0.3px;
      transition: all 0.3s ease;
      position: relative;
    }

    nav a:hover {
      color: #fff;
      text-shadow: 0 0 10px var(--accent-glow);
    }

    .lang button {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      color: #fff;
      padding: 8px 16px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .lang button:hover {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
      color: #000;
    }

    .menu-btn { display: none; font-size: 28px; background: none; border: none; color: #fff; cursor: pointer; }

    /* ===== CTA SECTION ===== */
    .cta {
      padding: 180px 24px 140px;
      text-align: center;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Fading the original background image into the dark theme */
    .cta::before {
      content: "";
      position: absolute; inset: 0;
      background: url('assets/image/pi1.jpg') center/cover no-repeat;
      opacity: 0.15; z-index: -1;
      mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
    }

    .cta h1 {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(48px, 8vw, 84px);
      font-weight: 900;
      margin-bottom: 24px;
      line-height: 1.05;
      letter-spacing: -2px;
      background: linear-gradient(180deg, #ffffff 0%, #a7f3d0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      max-width: 900px;
    }

    .cta p {
      font-size: 20px;
      font-weight: 400;
      color: var(--text-muted);
      max-width: 600px;
      margin: 0 auto 40px;
    }

    .btn {
      font-size: 1.1rem;
      padding: 1.2rem 3rem;
      border-radius: 100px;
      background: var(--accent);
      color: #022c22;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 0 30px var(--accent-glow);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Bouncy hover */
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
      transform: rotate(45deg); transition: 0.5s; opacity: 0;
    }

    .btn:hover {
      transform: scale(1.05) translateY(-5px);
      box-shadow: 0 15px 40px var(--accent-glow);
    }
    .btn:hover::after { left: 100%; opacity: 1; transition: 0.7s; }

    /* ===== CONTENT & CARDS ===== */
    .content { padding: 60px 24px; max-width: 1200px; margin: auto; position: relative; z-index: 2; }

    .content h2 {
      text-align: center;
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 60px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
    }

    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 40px 32px;
      border-radius: 32px;
      border: 1px solid var(--glass-border);
      transition: all 0.4s ease;
      text-align: left;
      position: relative;
      overflow: hidden;
    }

    /* Subtle top highlight for 3D glass effect */
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    }

    .card:hover {
      transform: translateY(-10px);
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(16, 185, 129, 0.3);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 20px var(--accent-glow);
    }

    .card h3 {
      color: #fff;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin: 24px 0 12px;
    }

    .card p { color: var(--text-muted); font-size: 16px; line-height: 1.7; }

    /* ===== PROCESS TIMELINE ===== */
    .process {
      padding: 80px 24px;
      max-width: 1100px;
      margin: 80px auto;
      position: relative;
      z-index: 2;
    }

    .process::before {
      content: ""; position: absolute; left: 50%; top: 0; bottom: 0; width: 2px;
      background: linear-gradient(to bottom, transparent, var(--accent), transparent);
      transform: translateX(-50%);
      box-shadow: 0 0 15px var(--accent-glow);
    }

    .step { display: flex; margin: 100px 0; position: relative; }
    .step.left { justify-content: flex-start; }
    .step.right { justify-content: flex-end; }

    .step-content {
      width: 42%;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      padding: 24px;
      border-radius: 32px;
      border: 1px solid var(--glass-border);
      transition: all 0.4s ease;
    }

    .step-content:hover {
      border-color: var(--accent);
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      transform: scale(1.02);
    }

    .step-content img {
      width: 100%; height: 240px; object-fit: cover;
      border-radius: 20px; margin-bottom: 24px;
      filter: grayscale(20%) contrast(1.1);
      transition: 0.4s;
    }
    
    .step-content:hover img { filter: grayscale(0%); }

    .step-content h3 { color: #fff; font-size: 24px; margin: 0 0 8px; letter-spacing: -0.5px; }
    .step-content p { color: var(--text-muted); margin: 0; }

    .cycle {
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--bg-base);
      color: var(--accent);
      font-size: 22px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      border: 2px solid var(--accent);
      box-shadow: 0 0 20px var(--accent-glow), inset 0 0 10px var(--accent-glow);
      z-index: 3;
      font-family: 'Outfit', sans-serif;
    }

    /* ===== STORYTELLING ===== */
    .story { max-width: 1200px; margin: 120px auto; padding: 40px 24px; position: relative; z-index: 2; }
    .story h2 { text-align: center; font-size: clamp(36px, 5vw, 48px); font-weight: 800; letter-spacing: -1px; margin-bottom: 80px; }

    .story-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }

    .story-img img {
      width: 100%; height: 550px; object-fit: cover;
      border-radius: 40px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
      border: 1px solid var(--glass-border);
    }

    .story-steps { display: flex; flex-direction: column; gap: 24px; }

    .story-step {
      background: transparent;
      padding: 32px 32px 32px 40px;
      border-radius: 24px;
      border-left: 2px solid var(--glass-border);
      transition: all 0.4s ease;
      position: relative;
    }

    /* Animated glowing border effect on hover */
    .story-step::before {
      content: ''; position: absolute; left: -2px; top: 0; bottom: 0; width: 2px;
      border-left: 2px solid var(--glass-border);

      background: var(--accent);
      transform: scaleY(0); transform-origin: top; transition: transform 0.4s ease;
      box-shadow: 0 0 10px var(--accent);
    }

    .story-step:hover { background: var(--glass-bg); transform: translateX(10px); }
    .story-step:hover::before { transform: scaleY(1); }

    .story-step span {
      display: inline-block; font-size: 13px; font-weight: 700; color: #022c22;
      background: var(--accent); padding: 6px 16px; border-radius: 50px;
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px;
    }

    .story-step h3 { margin: 0 0 12px; color: #fff; font-size: 22px; letter-spacing: -0.5px; }
    .story-step p { color: var(--text-muted); margin: 0; line-height: 1.7; }

    /* ===== QUOTE ===== */
    .quote {
      background: linear-gradient(135deg, rgba(2, 44, 34, 0.8), rgba(6, 78, 59, 0.5));
      border: 1px solid var(--glass-border);
      padding: 100px 40px;
      text-align: center;
      margin: 120px 24px;
      border-radius: 40px;
      position: relative;
      z-index: 2;
      max-width: 1000px;
      margin-left: auto; margin-right: auto;
      overflow: hidden;
    }

    .quote blockquote {
      max-width: 800px; margin: auto;
      font-size: clamp(24px, 4vw, 32px); font-weight: 500; color: #fff;
      line-height: 1.4; letter-spacing: -0.5px; position: relative; z-index: 2;
    }

    .quote span {
      display: inline-block; margin-top: 40px; font-size: 16px; font-weight: 800;
      color: var(--accent); text-transform: uppercase; letter-spacing: 3px;
    }

    /* ===== FOOTER ===== */
    .ar-footer {
      background: rgba(0, 0, 0, 0.4);
      border-top: 1px solid var(--glass-border);
      padding: 80px 24px 40px; position: relative; z-index: 2;
    }

    .footer-inner { max-width: 1200px; margin: auto; text-align: center; }

    .ar-footer h3 {
      font-family: 'Outfit', sans-serif;
      font-size: 36px; font-weight: 900; margin-bottom: 32px; letter-spacing: -1px;
    }

    .footer-contact {
      font-size: 18px; margin-bottom: 40px; display: flex; justify-content: center;
      align-items: center; gap: 20px; color: var(--text-muted);
    }

    .footer-contact a {
      color: var(--text-main); text-decoration: none; font-weight: 700;
      transition: color 0.3s; padding: 8px 16px; border-radius: 50px;
      background: var(--glass-bg); border: 1px solid var(--glass-border);
    }
    .footer-contact a:hover { color: var(--accent); border-color: var(--accent); }

    .footer-copy { font-size: 14px; color: var(--text-muted); border-top: 1px solid var(--glass-border); padding-top: 40px; }

    /* ===== MOBILE Adjustments ===== */
    @media (max-width: 900px) {
      header { top: 10px; width: calc(100% - 40px); border-radius: 20px; padding: 16px 20px; }
      nav {
        position: absolute; top: calc(100% + 10px); left: 0; width: 100%;
        background: rgba(2, 44, 34, 0.95); backdrop-filter: blur(20px);
        flex-direction: column; padding: 30px 20px; border-radius: 20px;
        border: 1px solid var(--glass-border); display: none; box-sizing: border-box;
      }
      nav.active { display: flex; }
      .menu-btn { display: block; }
      
      .cards { grid-template-columns: 1fr; }
      .process::before { left: 28px; }
      .step { margin: 60px 0; }
      .step.left, .step.right { justify-content: flex-end; }
      .step-content { width: calc(100% - 80px); }
      .cycle { left: 28px; top: 0; transform: translate(-50%, 0); }
      
      .story-wrapper { grid-template-columns: 1fr; gap: 40px; }
      .story-img img { height: 400px; }
      .footer-contact { flex-direction: column; gap: 15px; }
      .footer-contact span { display: none; }
    }

    /* ===== MORTARBOARD SVG ===== */
    .mortarboard-svg {
      display: block; margin: 0 0 24px 0; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      width: 64px; height: 64px; stroke: var(--accent) !important;
      filter: drop-shadow(0 0 10px var(--accent-glow));
    }
    .card:hover .mortarboard-svg { transform: translateY(-5px) scale(1.1) rotate(5deg); }

  </style>
</head>

<body>

  
  <header>
    <div class="logo">AngloRoom</div>
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <nav id="nav">
      <a href="#about" data-i18n="about"></a>
      <a href="logon.html" data-i18n="test"></a>
      <a href="login.html" class="login-btn" data-i18n="login"></a>
      <div class="lang">
        <button onclick="setLang('uz')">UZ</button>
        <button onclick="setLang('ru')">RU</button>
      </div>
    </nav>
  </header>

  <section class="cta" id="test">
    <h1 data-i18n="title" data-aos="fade-up"></h1>
    <p data-i18n="desc" data-aos="fade-up" data-aos-delay="100"></p>
    <a href="logon.html" class="btn" data-i18n="btn" data-aos="fade-up" data-aos-delay="200"></a>
  </section>

  <section class="content" id="about">
    <h2 data-i18n="why" data-aos="fade-up"></h2>

    <div class="cards">
      <div class="card" data-aos="fade-up" data-aos-delay="100">
        <img src="assets/image/education2.svg" alt="" class="mortarboard-svg">
        <h3 data-i18n="c1t"></h3>
        <p data-i18n="c1d"></p>
      </div>
      <div class="card" data-aos="fade-up" data-aos-delay="200">
        <img src="assets/image/education.svg" alt="" class="mortarboard-svg">
        <h3 data-i18n="c2t"></h3>
        <p data-i18n="c2d"></p>
      </div>
      <div class="card" data-aos="fade-up" data-aos-delay="300">
        <img src="assets/image/education3.svg" alt="" class="mortarboard-svg">
        <h3 data-i18n="c3t"></h3>
        <p data-i18n="c3d"></p>
      </div>
    </div>
  </section>

  <div class="process">
    <div class="step left" data-aos="fade-right">
      <div class="cycle">1</div>
      <div class="step-content">
        <img src="assets/image/pi2.jpg" alt="Step 1">
        <h3 data-i18n="p1t"></h3>
        <p data-i18n="p1d"></p>
      </div>
    </div>

    <div class="step right" data-aos="fade-left">
      <div class="cycle">2</div>
      <div class="step-content">
        <img src="assets/image/pi5.jpg" alt="Step 2">
        <h3 data-i18n="p2t"></h3>
        <p data-i18n="p2d"></p>
      </div>
    </div>

    <div class="step left" data-aos="fade-right">
      <div class="cycle">3</div>
      <div class="step-content">
        <img src="assets/image/pi3.jpg" alt="Step 3">
        <h3 data-i18n="p3t"></h3>
        <p data-i18n="p3d"></p>
      </div>
    </div>

    <div class="step right" data-aos="fade-left">
      <div class="cycle">4</div>
      <div class="step-content">
        <img src="assets/image/p4.jpg" alt="Step 4">
        <h3 data-i18n="p4t"></h3>
        <p data-i18n="p4d"></p>
      </div>
    </div>
  </div>

  <section class="story">
    <h2 data-i18n="storyTitle" data-aos="fade-up"></h2>

    <div class="story-wrapper">
      <div class="story-img" data-aos="fade-right">
        <img src="assets/image/story.jpg" alt="Students learning together">
      </div>

      <div class="story-steps">
        <div class="story-step" data-aos="fade-left" data-aos-delay="100">
          <span data-i18n="story1tag"></span>
          <h3 data-i18n="story1t"></h3>
          <p data-i18n="story1d"></p>
        </div>

        <div class="story-step" data-aos="fade-left" data-aos-delay="200">
          <span data-i18n="story2tag"></span>
          <h3 data-i18n="story2t"></h3>
          <p data-i18n="story2d"></p>
        </div>

        <div class="story-step" data-aos="fade-left" data-aos-delay="300">
          <span data-i18n="story3tag"></span>
          <h3 data-i18n="story3t"></h3>
          <p data-i18n="story3d"></p>
        </div>
      </div>
    </div>
  </section>

  <section class="quote" data-aos="zoom-in">
    <blockquote data-i18n="quote"></blockquote>
    <span data-i18n="quoteAuthor"></span>
  </section>

  
  <footer class="ar-footer">
    <div class="footer-inner">
      <h3>AngloRoom</h3>
  
      <p class="footer-contact">
        📞 +998 94 719 19 87 
        <span>•</span>
        <a href="https://t.me/angloroom_and" target="_blank">@angloroom_and</a>
      </p>
  
      <p class="footer-copy">
        © 2025 AngloRoom • Uzbekistan
      </p>
    </div>
  </footer>
  
  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <script>AOS.init({ once: true, offset: 50, duration: 800 });</script>
  <script src="assets/js/index.js"></script> 
</body>
</html>

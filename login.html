<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AngloRoom - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Outfit:wght@700;900&display=swap" rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>

  <script src="assets/js/firebase.js" defer></script>
  <script src="assets/js/auth.js" defer></script>

  <style>
    :root {
      --bg-base: #022c22;
      --accent: #10b981;
      --accent-glow: rgba(16, 185, 129, 0.4);
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    /* ===== BASE & BACKGROUND ===== */
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg-base);
      color: var(--text-main);
      overflow-x: hidden;
    }

    /* Ambient Glows to match Home Page */
    body::before {
      content: ''; position: fixed; top: -10%; left: -10%; width: 50vw; height: 50vw;
      background: radial-gradient(circle, rgba(16,185,129,0.1) 0%, transparent 70%);
      filter: blur(100px); z-index: -1;
    }

    /* ===== LAYOUT ===== */
    .auth-card-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .auth-card-wrapper-inner {
      display: flex;
      width: 100%;
      max-width: 1000px;
      min-height: 600px;
      border-radius: 32px;
      overflow: hidden;
      background: var(--glass-bg);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid var(--glass-border);
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
    }

    /* ===== IMAGE SIDE ===== */
    .auth-image {
      flex: 1.2;
      background: url('assets/image/pi.jpg') center / cover no-repeat;
      position: relative;
    }

    /* Dark overlay for the image side */
    .auth-image::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to right, transparent, var(--bg-base));
    }

    /* ===== FORM SIDE ===== */
    .auth-card {
      flex: 1;
      padding: 60px 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      box-sizing: border-box;
    }

    /* ===== BACK TO HOME BUTTON ===== */
    .back-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 24px;
      padding: 8px 16px;
      border-radius: 50px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      transition: all 0.3s ease;
      align-self: flex-start;
    }

    .back-home:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--accent);
      transform: translateX(-5px);
    }

    .auth-card h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 8px;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .auth-card p {
      font-size: 16px;
      margin-bottom: 40px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* ===== MODERN INPUTS ===== */
    .nebula-input {
      position: relative;
      margin-bottom: 24px;
    }

    .nebula-input .input {
      width: 100%;
      padding: 18px 20px;
      font-size: 16px;
      font-weight: 500;
      border-radius: 16px;
      border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      outline: none;
      box-sizing: border-box;
      transition: all 0.3s ease;
    }

    .nebula-input .input:focus {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
    }

    /* Floating label */
    .nebula-input .user-label {
      position: absolute;
      top: 50%;
      left: 20px;
      transform: translateY(-50%);
      font-size: 15px;
      color: var(--text-muted);
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      padding: 0 4px;
    }

    .nebula-input .input:focus ~ .user-label,
    .nebula-input .input:valid ~ .user-label {
      top: 0;
      font-size: 12px;
      color: var(--accent);
      background: #064e3b; /* Matches deep green bg */
      border-radius: 4px;
    }

    /* Particles Refined */
    .nebula-particle {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      top: 50%;
      left: 20px;
      opacity: 0;
      pointer-events: none;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
    }

    .nebula-input .input:focus ~ .nebula-particle {
      animation: nebula-float 1s ease-out forwards;
    }

    @keyframes nebula-float {
      0% { transform: translate(0, -50%) scale(1); opacity: 0; }
      50% { opacity: 1; }
      100% {
        transform: translate(calc(var(--x) * 100px), calc(var(--y) * 50px)) scale(0);
        opacity: 0;
      }
    }

    /* ===== STAR BUTTON ===== */
    .star-button {
      position: relative;
      width: 100%;
      padding: 18px 0;
      background: var(--accent);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 17px;
      font-weight: 800;
      color: #022c22;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      margin-top: 10px;
      box-shadow: 0 10px 25px var(--accent-glow);
    }

    .star-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px var(--accent-glow);
    }

    .star-button:active { transform: scale(0.98); }

    .star-button svg {
      position: absolute;
      width: 16px;
      height: 16px;
      fill: #fff;
      opacity: 0;
      transition: all 0.6s ease;
    }

    .star-button .star-1 { top: 10%; left: 10%; }
    .star-button .star-2 { top: 20%; left: 80%; }
    .star-button .star-3 { top: 70%; left: 20%; }
    .star-button .star-4 { top: 60%; left: 70%; }

    .star-button:hover svg { opacity: 0.6; transform: scale(1.5) rotate(20deg); }

    /* ===== MOBILE ===== */
    @media (max-width: 850px) {
      .auth-card-wrapper-inner {
        flex-direction: column;
        max-width: 450px;
      }
      .auth-image { display: none; }
      .auth-card { padding: 40px 30px; }
      .auth-card h1 { font-size: 28px; }
    }
    
  </style>
</head>

<body>

<div class="auth-card-wrapper">
  <div class="auth-card-wrapper-inner">

    <div class="auth-image"></div>
    <div class="auth-card">
      
      <a href="index.html" class="back-home">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Back to Home
      </a>

      <h1>AngloRoom</h1>
      <p>Log in to your account</p>

      <form id="auth-form">

        <div class="nebula-input">
          <input required type="email" id="email" class="input">
          <label class="user-label">Email Address</label>

          <div class="nebula-particle" style="--x:0.5;--y:-0.8"></div>
          <div class="nebula-particle" style="--x:-0.5;--y:0.8"></div>
          <div class="nebula-particle" style="--x:0.8;--y:0.4"></div>
        </div>

        <div class="nebula-input">
          <input required type="password" id="password" class="input">
          <label class="user-label">Password</label>

          <div class="nebula-particle" style="--x:-0.8;--y:-0.5"></div>
          <div class="nebula-particle" style="--x:0.6;--y:0.7"></div>
          <div class="nebula-particle" style="--x:-0.3;--y:0.9"></div>
        </div>

        <button type="submit" class="star-button">
          Sign In
          <svg class="star-1" viewBox="0 0 784 815"><path d="M392 0c-20 210-184 378-392 407 207 29 371 197 392 407 21-210 184-378 392-407-208-29-371-197-392-407z"/></svg>
          <svg class="star-2" viewBox="0 0 784 815"><path d="M392 0c-20 210-184 378-392 407 207 29 371 197 392 407 21-210 184-378 392-407-208-29-371-197-392-407z"/></svg>
          <svg class="star-3" viewBox="0 0 784 815"><path d="M392 0c-20 210-184 378-392 407 207 29 371 197 392 407 21-210 184-378 392-407-208-29-371-197-392-407z"/></svg>
          <svg class="star-4" viewBox="0 0 784 815"><path d="M392 0c-20 210-184 378-392 407 207 29 371 197 392 407 21-210 184-378 392-407-208-29-371-197-392-407z"/></svg>
        </button>

      </form>
    </div>

  </div>
</div>

</body>
</html>

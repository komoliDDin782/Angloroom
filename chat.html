<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AngloRoom - Global Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <script src="assets/js/firebase.js" defer></script>
  <script src="assets/js/chat.js" defer></script>

  <style>
    :root {
      --bg-base: #022c22;
      --accent: #10b981;
      --accent-glow: rgba(16, 185, 129, 0.3);
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg-base);
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      /* Improve touch behavior */
      -webkit-tap-highlight-color: transparent;
    }

    /* --- Navbar Styling --- */
    header {
      padding: 16px 12px;
      display: flex;
      justify-content: center;
      background: rgba(2, 44, 34, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--glass-border);
      flex-shrink: 0;
    }

    nav { 
      display: flex; 
      gap: clamp(8px, 3vw, 25px);
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      transition: 0.3s;
      white-space: nowrap;
      padding: 6px 4px;
    }

    @media (min-width: 480px) {
      nav a {
        font-size: 15px;
        padding: 6px 8px;
      }
    }

    nav a:hover, nav a.active {
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent-glow);
    }

    /* --- Chat Layout --- */
    .chat-container {
      flex: 1;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      background: var(--glass-bg);
      border-left: 1px solid var(--glass-border);
      border-right: 1px solid var(--glass-border);
      overflow: hidden;
      min-height: 0; /* flexbox height constraint */
    }

    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--glass-border);
      text-align: center;
      flex-shrink: 0;
    }

    .chat-header h1 {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(20px, 5vw, 26px);
      background: linear-gradient(135deg, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .chat-header p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* --- Messages Area --- */
    .messages-box {
      flex: 1;
      padding: 16px 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-height: 0;
      -webkit-overflow-scrolling: touch;
    }

    /* Custom Scrollbar */
    .messages-box::-webkit-scrollbar { width: 5px; }
    .messages-box::-webkit-scrollbar-track { background: transparent; }
    .messages-box::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

    .msg-wrapper {
      display: flex;
      gap: 10px;
      max-width: 90%;
      align-items: flex-end;
    }

    /* On larger screens, message width is more constrained for readability */
    @media (min-width: 600px) {
      .msg-wrapper {
        max-width: 75%;
      }
    }

    /* Incoming Messages (Left side) */
    .msg-wrapper.incoming { 
      align-self: flex-start; 
    }
    
    /* Outgoing Messages (Right side) */
    .msg-wrapper.outgoing {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    /* FIX: Avatar maintains consistent size and doesn't shrink */
    .user-avatar {
      width: 38px;
      height: 38px;
      min-width: 38px;  /* critical: prevents shrinking in flex container */
      border-radius: 50px;
      object-fit: cover;
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.1);
      flex-shrink: 0;
      align-self: flex-end; /* aligns avatar with bottom of bubble */
    }

    @media (max-width: 480px) {
      .user-avatar {
        width: 34px;
        height: 34px;
        min-width: 34px;
      }
    }

    .msg-body {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0; /* allows bubble to shrink correctly */
      flex: 1;
    }

    .msg-wrapper.outgoing .msg-body { 
      align-items: flex-end; 
    }

    .meta-info {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
      padding: 0 4px;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.45;
      word-break: break-word;
      overflow-wrap: break-word;
      white-space: pre-wrap;
      display: inline-block;
      max-width: 100%;
    }

    .incoming .bubble {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-top-left-radius: 4px;
    }

    .outgoing .bubble {
      background: linear-gradient(135deg, #0f766e, var(--bg-base));
      border: 1px solid var(--accent);
      box-shadow: 0 0 15px var(--accent-glow);
      border-top-right-radius: 4px;
      color: #fff;
    }

    /* --- Input Area --- */
    .input-area {
        padding: 12px 16px;
background: transparent;
backdrop-filter: blur(10px);
-webkit-backdrop-filter: blur(10px);
flex-shrink: 0;
padding-bottom: max(12px, env(safe-area-inset-bottom));
margin-bottom: clamp(16px, 4vw, 32px); /* Responsive: 16px on mobile, up to 32px on larger screens */
    }

    .input-form {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .input-form input {
      flex: 1;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--glass-border);
      padding: 14px 18px;
      border-radius: 30px;
      color: #fff;
      font-size: 15px;
      font-family: inherit;
      transition: 0.3s;
      min-width: 0;
      outline: none;
    }

    .input-form input:focus {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .input-form input::placeholder {
      color: #94a3b8;
      opacity: 0.7;
    }

    .send-btn {
      background: var(--accent);
      color: #022c22;
      border: none;
      width: 48px;
      height: 48px;
      min-width: 48px;
      border-radius: 50px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: 0.3s;
      flex-shrink: 0;
      box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2);
    }

    .send-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 18px var(--accent);
    }

    @media (max-width: 480px) {
      .send-btn {
        width: 44px;
        height: 44px;
        min-width: 44px;
      }
      .input-form input {
        padding: 12px 16px;
        font-size: 14px;
      }
    }

    /* Additional mobile friendly adjustments */
    .msg-wrapper {
      margin-bottom: 2px;
    }
  </style>
</head>
<body>

  <header>
    <nav>
      <a href="main.html">Main</a>
      <a href="quiz.html">Quizzes</a>
      <a href="results.html">Results</a>
      <a href="profile.html">Profile</a>
      <a href="chat.html" class="active">Chat</a>
    </nav>
  </header>

  <main class="chat-container">
    <div class="chat-header">
      <h1>English Speaking Club</h1>
      <p>Challenge yourself! Text only in English 🇬🇧</p>
    </div>

    <div class="messages-box" id="messages-box">
      <!-- Example message structure (dynamically generated by chat.js) -->
      <!-- 
      <div class="msg-wrapper incoming">
        <img class="user-avatar" src="avatar.jpg" alt="avatar">
        <div class="msg-body">
          <span class="meta-info">User · 10:30 AM</span>
          <div class="bubble">Hello! This is a very long message that demonstrates how the avatar stays consistent in size and does not become too small on mobile devices.</div>
        </div>
      </div>
      -->
    </div>

    <div class="input-area">
      <form class="input-form" id="chat-form">
        <input type="text" id="msg-input" placeholder="Type a message in English..." autocomplete="off" required maxlength="500">
        <button type="submit" class="send-btn"><i class="fas fa-paper-plane"></i></button>
      </form>
    </div>
  </main>

</body>
</html>

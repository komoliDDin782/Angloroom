<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AngloRoom - Global Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <script src="assets/js/firebase.js" defer></script>
  <script src="assets/js/chat.js" defer></script>

  <style>
    :root {
      /* Background & Base */
      --bg-base: #022c22;
      --bg-glass: rgba(255, 255, 255, 0.03);
      --bg-glass-hover: rgba(255, 255, 255, 0.04);
      --bg-glass-strong: rgba(255, 255, 255, 0.06);
      --bg-input: rgba(255, 255, 255, 0.04);
      --bg-input-focus: rgba(255, 255, 255, 0.08);
      --bg-avatar: rgba(255, 255, 255, 0.1);
      --bg-menu: rgba(5, 78, 63, 0.96);
      --bg-menu-btn: rgba(255, 255, 255, 0.08);
      --bg-menu-btn-hover: rgba(16, 185, 129, 0.18);
      --bg-reaction: rgba(255, 255, 255, 0.08);
      --bg-reaction-hover: rgba(16, 185, 129, 0.2);
      --bg-reaction-grid: rgba(255, 255, 255, 0.04);
      --bg-reply-preview: rgba(16, 185, 129, 0.08);
      --bg-input-area: rgba(2, 44, 34, 0.7);
      --bg-modal: #043c2f;
      --bg-modal-overlay: rgba(2, 44, 34, 0.95);
      --bg-stat-card: rgba(255, 255, 255, 0.08);
      --bg-level-inactive: rgba(255, 255, 255, 0.1);
      
      /* Accent */
      --accent: #10b981;
      --accent-glow: rgba(16, 185, 129, 0.3);
      --accent-glow-strong: rgba(16, 185, 129, 0.5);
      --accent-bg-light: rgba(16, 185, 129, 0.12);
      --accent-border-light: rgba(16, 185, 129, 0.2);
      --accent-pill-bg: rgba(16, 185, 129, 0.22);
      --accent-pill-border: rgba(16, 185, 129, 0.5);
      
      /* Danger */
      --danger: #ef4444;
      --danger-bg: rgba(220, 38, 38, 0.15);
      --danger-border: rgba(220, 38, 38, 0.3);
      --danger-hover-bg: #dc2626;
      --danger-hover-text: #fff;
      
      /* Glass & Borders */
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-border-light: rgba(255, 255, 255, 0.12);
      --glass-border-medium: rgba(255, 255, 255, 0.14);
      --glass-border-strong: rgba(255, 255, 255, 0.16);
      --date-separator-line: rgba(255, 255, 255, 0.1);
      --reaction-bar-border: rgba(255, 255, 255, 0.08);
      
      /* Text */
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --text-white: #fff;
      --text-on-accent: #022c22;
      --text-bubble-incoming: #e2e8f0;
      --text-bubble-outgoing: #fff;
      --text-reply-quote: #e2e8f0;
      --text-modal-stat: #d1d5db;
      
      /* Bubbles */
      --bubble-incoming-bg: rgba(255, 255, 255, 0.06);
      --bubble-incoming-border: rgba(255, 255, 255, 0.14);
      --bubble-outgoing-bg-start: #0f766e;
      --bubble-outgoing-bg-end: #022c22;
      
      /* Reply */
      --reply-quote-bg: rgba(16, 185, 129, 0.12);
      --reply-quote-outgoing-bg: rgba(255, 255, 255, 0.08);
      --reply-user-label: var(--accent);
      --reply-user-label-outgoing: #fff;
      --reply-quote-border-outgoing: #fff;
      
      /* Shadows */
      --shadow-send-btn: 0 4px 10px rgba(16, 185, 129, 0.2);
      --shadow-send-btn-hover: 0 0 18px var(--accent);
      --shadow-menu: 0 24px 48px rgba(0, 0, 0, 0.32);
      --shadow-stat-card: 0 10px 30px rgba(0, 0, 0, 0.12);
      
      /* Header */
      --header-bg: rgba(2, 44, 34, 0.9);
      
      /* Gradient Text */
      --gradient-text-start: #fff;
      
      /* Modal */
      --modal-pic-border: #043c2f;
      --modal-close-color: #fff;
      --modal-close-opacity: 0.6;
      
      /* Scrollbar */
      --scrollbar-thumb: rgba(255, 255, 255, 0.08);
      --scrollbar-track: transparent;
      --reaction-scrollbar-thumb: rgba(255, 255, 255, 0.24);
      --reaction-scrollbar-track: rgba(255, 255, 255, 0.06);
      
      /* Online Counter */
      --pulse-dot-color: var(--accent);
      --pulse-glow-color: rgba(16, 185, 129, 0.5);
      
      /* Typography */
      --font-primary: 'Plus Jakarta Sans', sans-serif;
      --font-display: 'Outfit', sans-serif;
      
      /* Border Radius */
      --avatar-radius: 50px;
      --bubble-radius: 18px;
      --bubble-radius-small: 4px;
      --input-radius: 30px;
      --btn-radius: 50px;
      --menu-radius: 18px;
      --menu-btn-radius: 14px;
      --reaction-btn-radius: 50%;
      --reaction-pill-radius: 999px;
      --modal-radius: 28px;
      --stat-radius: 18px;
      --level-step-radius: 3px;
      --admin-btn-radius: 6px;
      --reply-quote-radius: 14px;
      --reaction-grid-radius: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg-base);
      font-family: var(--font-primary);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* --- Navbar Styling --- */
    header {
      padding: 16px 12px;
      display: flex;
      justify-content: center;
      background: var(--header-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--glass-border);
      flex-shrink: 0;
    }

    nav { 
      display: flex; 
      gap: clamp(8px, 3vw, 25px);
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      transition: 0.3s;
      white-space: nowrap;
      padding: 6px 4px;
    }

    @media (min-width: 480px) {
      nav a {
        font-size: 15px;
        padding: 6px 8px;
      }
    }

    nav a:hover, nav a.active {
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent-glow);
    }

    /* --- Chat Layout --- */
    .chat-container {
      flex: 1;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      background: var(--bg-glass);
      border-left: 1px solid var(--glass-border);
      border-right: 1px solid var(--glass-border);
      overflow: hidden;
      min-height: 0;
    }

    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--glass-border);
      text-align: center;
      flex-shrink: 0;
    }

    .chat-header h1 {
      font-family: var(--font-display);
      font-size: clamp(20px, 5vw, 26px);
      background: linear-gradient(135deg, var(--gradient-text-start), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* --- Messages Area --- */
    .messages-box {
      flex: 1;
      padding: 16px 12px;
      padding-bottom: 8px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-height: 0;
      -webkit-overflow-scrolling: touch;
    }

    .messages-box::-webkit-scrollbar { width: 5px; }
    .messages-box::-webkit-scrollbar-track { background: var(--scrollbar-track); }
    .messages-box::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 10px; }

    .msg-wrapper {
      display: flex;
      gap: 10px;
      max-width: 90%;
      align-items: flex-end;
      margin-bottom: 2px;
    }

    @media (min-width: 600px) {
      .msg-wrapper { max-width: 75%; }
    }

    .msg-wrapper.incoming { align-self: flex-start; }
    
    .msg-wrapper.outgoing {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .user-avatar {
      width: 38px;
      height: 38px;
      min-width: 38px;
      border-radius: var(--avatar-radius);
      object-fit: cover;
      border: 1px solid var(--glass-border);
      background: var(--bg-avatar);
      flex-shrink: 0;
      align-self: flex-end;
    }

    @media (max-width: 480px) {
      .user-avatar {
        width: 34px;
        height: 34px;
        min-width: 34px;
      }
    }

    .msg-body {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
      flex: 1;
    }

    .msg-wrapper.outgoing .msg-body { align-items: flex-end; }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
    }

    .msg-wrapper.outgoing .meta-row {
      flex-direction: row-reverse;
    }

    .meta-info {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
      padding: 0 4px;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--bubble-radius);
      font-size: 15px;
      line-height: 1.45;
      word-break: break-word;
      overflow-wrap: break-word;
      white-space: pre-wrap;
      display: inline-block;
      max-width: 100%;
      cursor: pointer;
      position: relative;
      transition: transform 0.2s;
    }

    .bubble:hover {
      transform: scale(1.01);
    }

    .msg-timestamp {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
      display: block;
    }

    .date-separator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 20px 0;
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 600;
    }

    .date-separator::before,
    .date-separator::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--date-separator-line);
    }

    .incoming .bubble {
      background: var(--bubble-incoming-bg);
      border: 1px solid var(--bubble-incoming-border);
      border-top-left-radius: var(--bubble-radius-small);
      color: var(--text-bubble-incoming);
    }

    .outgoing .bubble {
      background: linear-gradient(135deg, var(--bubble-outgoing-bg-start), var(--bubble-outgoing-bg-end));
      border: 1px solid var(--accent);
      box-shadow: 0 0 15px var(--accent-glow);
      border-top-right-radius: var(--bubble-radius-small);
      color: var(--text-bubble-outgoing);
    }

    /* --- Reply Box Context UI --- */
    .reply-quote {
      background: var(--reply-quote-bg);
      border-left: 4px solid var(--accent);
      padding: 10px 14px;
      border-radius: var(--reply-quote-radius);
      font-size: 13px;
      color: var(--text-reply-quote);
      margin-bottom: 10px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .outgoing .reply-quote {
      border-left-color: var(--reply-quote-border-outgoing);
      background: var(--reply-quote-outgoing-bg);
    }

    .reply-user-label {
      font-weight: 700;
      font-size: 11px;
      display: block;
      color: var(--reply-user-label);
      margin-bottom: 2px;
    }
    
    .outgoing .reply-user-label {
      color: var(--reply-user-label-outgoing);
    }

    /* --- Moderation Button --- */
    .admin-delete-btn {
      background: var(--danger-bg);
      border: 1px solid var(--danger-border);
      color: var(--danger);
      border-radius: var(--admin-btn-radius);
      padding: 2px 6px;
      font-size: 11px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: 0.2s;
    }

    .admin-delete-btn:hover {
      background: var(--danger-hover-bg);
      color: var(--danger-hover-text);
    }

    /* --- Input Area with Reply Context Ribbon --- */
    .input-area {
      background: var(--bg-input-area);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      flex-shrink: 0;
      border-top: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
    }

    .reply-preview-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-reply-preview);
      border-bottom: 1px solid var(--accent-border-light);
      padding: 8px 16px;
      font-size: 13px;
    }
    
    .reply-preview-bar.hidden {
      display: none;
    }

    .reply-preview-text {
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 85%;
    }

    .reply-preview-text strong {
      color: var(--accent);
    }

    .cancel-reply-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      padding: 2px 6px;
    }

    .cancel-reply-btn:hover {
      color: var(--danger);
    }

    .input-wrapper {
      padding: 12px 16px;
      padding-bottom: max(16px, calc(env(safe-area-inset-bottom) + 8px));
    }

    .input-form {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .input-form input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--glass-border);
      padding: 14px 18px;
      border-radius: var(--input-radius);
      color: var(--text-white);
      font-size: 15px;
      font-family: inherit;
      transition: 0.3s;
      min-width: 0;
      outline: none;
    }

    .input-form input:focus {
      border-color: var(--accent);
      background: var(--bg-input-focus);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .input-form input::placeholder {
      color: var(--text-muted);
      opacity: 0.7;
    }

    .send-btn {
      background: var(--accent);
      color: var(--text-on-accent);
      border: none;
      width: 48px;
      height: 48px;
      min-width: 48px;
      border-radius: var(--btn-radius);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: 0.3s;
      flex-shrink: 0;
      box-shadow: var(--shadow-send-btn);
    }

    .send-btn:hover {
      transform: scale(1.05);
      box-shadow: var(--shadow-send-btn-hover);
    }

    /* --- Message Action Menu --- */
    .message-action-menu {
      display: none;
      position: fixed;
      z-index: 1200;
      width: min(240px, 92vw);
      background: var(--bg-menu);
      border: 1px solid var(--glass-border-light);
      border-radius: var(--menu-radius);
      padding: 10px 12px;
      box-shadow: var(--shadow-menu);
      gap: 10px;
      color: var(--text-main);
      backdrop-filter: blur(18px);
    }

    .message-action-menu[aria-hidden="false"] {
      display: flex;
    }

    .message-action-menu {
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
    }

    .message-action-menu button {
      width: 100%;
      border: none;
      background: var(--bg-menu-btn);
      color: var(--text-main);
      padding: 10px 14px;
      border-radius: var(--menu-btn-radius);
      cursor: pointer;
      font-weight: 700;
      transition: background 0.2s, transform 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .message-action-menu button:hover {
      background: var(--bg-menu-btn-hover);
      transform: translateY(-1px);
    }

    #action-reply,
    #action-clear-reaction {
      width: auto;
      min-width: 160px;
      align-self: center;
    }

    .reaction-grid {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 8px 4px 4px;
      width: 100%;
      scrollbar-width: thin;
      -webkit-overflow-scrolling: touch;
      background: var(--bg-reaction-grid);
      border-radius: var(--reaction-grid-radius);
    }

    .reaction-grid::-webkit-scrollbar {
      height: 6px;
    }

    .reaction-grid::-webkit-scrollbar-thumb {
      background: var(--reaction-scrollbar-thumb);
      border-radius: 999px;
    }

    .reaction-grid::-webkit-scrollbar-track {
      background: var(--reaction-scrollbar-track);
      border-radius: 999px;
    }

    .reaction-grid .reaction-btn {
      min-width: 36px;
      width: 36px !important;
      max-width: 36px;
      height: 36px !important;
      min-height: 36px;
      aspect-ratio: 1;
      border-radius: var(--reaction-btn-radius);
      background: var(--bg-reaction);
      border: 1px solid var(--glass-border-strong);
      cursor: pointer;
      font-size: 16px;
      transition: transform 0.2s, background 0.2s;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
      padding: 0;
      margin: 0;
    }

    .reaction-grid .reaction-btn:hover {
      background: var(--bg-reaction-hover);
      transform: translateY(-2px);
    }

    .reaction-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      padding-top: 8px;
      border-top: 1px solid var(--reaction-bar-border);
    }

    .reaction-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border-radius: var(--reaction-pill-radius);
      padding: 6px 10px;
      background: var(--bg-reaction);
      border: 1px solid var(--glass-border-medium);
      color: var(--text-main);
      font-size: 14px;
    }

    .reaction-pill.selected {
      background: var(--accent-pill-bg);
      border-color: var(--accent-pill-border);
    }

    .message-action-menu .selected {
      background: var(--bg-reaction-hover);
    }

    @media (max-width: 480px) {
      .input-wrapper {
        padding: 10px 12px;
        padding-bottom: max(14px, calc(env(safe-area-inset-bottom) + 6px));
      }

      .send-btn {
        width: 44px;
        height: 44px;
        min-width: 44px;
      }

      .input-form input {
        padding: 12px 16px;
        font-size: 14px;
      }
    }

    /* ===== MODAL STYLE INTEGRATION FOR CHAT ===== */
    #profile-preview-modal {
      position: fixed;
      inset: 0;
      background: var(--bg-modal-overlay);
      backdrop-filter: blur(20px);
      z-index: 1000;
      display: none;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .modal-content {
      background: var(--bg-modal);
      width: 100%;
      max-width: 400px;
      border-radius: var(--modal-radius);
      overflow: hidden;
      position: relative;
      border: 1px solid var(--glass-border);
      animation: modalPop 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes modalPop {
      0% { opacity: 0; transform: scale(0.92) translateY(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-bg { height: 130px; background-size: cover; background-position: center; }
    
    .modal-profile-pic {
      width: 110px; height: 110px; border-radius: 50%;
      object-fit: cover; border: 4px solid var(--modal-pic-border);
      margin: -55px auto 0; display: block; position: relative;
    }

    .modal-info { padding: 20px 24px 30px; text-align: center; }
    .modal-info h2 { font-family: var(--font-display); font-size: 24px; color: var(--text-main); }
    #preview-level { color: var(--accent); font-weight: 700; margin-bottom: 10px; font-size: 13px; }
    #preview-about { margin: 0 auto 18px; max-width: 320px; color: var(--text-muted); font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
    
    .modal-stats { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
    .modal-stat-card { min-width: 100px; flex: 1 1 100px; padding: 14px 12px; border-radius: var(--stat-radius); background: var(--bg-stat-card); border: 1px solid var(--glass-border-light); box-shadow: var(--shadow-stat-card); }
    .modal-stat-card strong { display: block; font-size: 24px; font-weight: 800; margin-bottom: 6px; color: var(--text-white); }
    .modal-stat-card span { display: block; color: var(--text-modal-stat); font-size: 13px; }
    
    .modal-level-progress { display: flex; gap: 6px; justify-content: center; }
    .level-step { flex: 1; height: 6px; border-radius: var(--level-step-radius); background: var(--bg-level-inactive); }
    .level-step.active { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow-strong); }

    .close { position: absolute; top: 12px; right: 18px; font-size: 28px; color: var(--modal-close-color); cursor: pointer; z-index: 10; opacity: var(--modal-close-opacity); }

    /* --- Live Online Counter UI --- */
    .online-counter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 6px;
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .pulse-dot {
      width: 8px;
      height: 8px;
      background-color: var(--pulse-dot-color);
      border-radius: 50%;
      box-shadow: 0 0 0 0 var(--pulse-glow-color);
      animation: counterGlowPulse 1.8s infinite;
    }

    @keyframes counterGlowPulse {
      0% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 var(--pulse-glow-color);
      }
      70% {
        transform: scale(1);
        box-shadow: 0 0 0 8px rgba(16, 185, 129, 0);
      }
      100% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
      }
    }
  </style>
</head>
<body>

  <header>
    <nav>
      <a href="main.html">Main</a>
      <a href="quiz.html">Quizzes</a>
      <a href="results.html">Results</a>
      <a href="profile.html">Profile</a>
      <a href="chat.html" class="active">Chat</a>
    </nav>
  </header>

  <main class="chat-container">
    <div class="chat-header">
      <h1>English Speaking Club</h1>
      
      <div class="online-counter">
        <span class="pulse-dot"></span>
        <span id="online-count">Online: 0</span>
      </div>
    </div>
    
    <div class="messages-box" id="messages-box">
    </div>

    <div id="message-action-menu" class="message-action-menu" aria-hidden="true">
      <div class="reaction-grid">
        <button type="button" class="reaction-btn" data-emoji="👍">👍</button>
        <button type="button" class="reaction-btn" data-emoji="❤️">❤️</button>
        <button type="button" class="reaction-btn" data-emoji="😂">😂</button>
        <button type="button" class="reaction-btn" data-emoji="🎉">🎉</button>
        <button type="button" class="reaction-btn" data-emoji="😮">😮</button>
        <button type="button" class="reaction-btn" data-emoji="😢">😢</button>
        <button type="button" class="reaction-btn" data-emoji="😊">😊</button>
        <button type="button" class="reaction-btn" data-emoji="😎">😎</button>
        <button type="button" class="reaction-btn" data-emoji="🎊">🎊</button>
        <button type="button" class="reaction-btn" data-emoji="💯">💯</button>
      </div>
      <button type="button" id="action-reply"><i class="fas fa-reply"></i> Reply</button>
      <button type="button" id="action-clear-reaction">Remove reaction</button>
    </div>

    <div class="input-area">
      <div class="reply-preview-bar hidden" id="reply-preview-bar">
        <div class="reply-preview-text" id="reply-preview-text"></div>
        <button type="button" class="cancel-reply-btn" id="cancel-reply-btn" title="Cancel reply">
          <i class="fas fa-xmark"></i>
        </button>
      </div>
      
      <div class="input-wrapper">
        <form class="input-form" id="chat-form">
          <input type="text" id="msg-input" placeholder="Type a message in English..." autocomplete="off" required maxlength="500">
          <button type="submit" class="send-btn"><i class="fas fa-paper-plane"></i></button>
        </form>
      </div>
    </div>
  </main>

  <div id="profile-preview-modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <div class="modal-bg" id="preview-bg"></div>
      <img id="preview-pic" class="modal-profile-pic" src="" alt="Profile">
      <div class="modal-info">
        <h2 id="preview-nickname">Nickname</h2>
        <p id="preview-level">Level: —</p>
        <p id="preview-about">About me is not set yet.</p>

        <div class="modal-level-progress">
          <div class="level-step"></div>
          <div class="level-step"></div>
          <div class="level-step"></div>
          <div class="level-step"></div>
        </div>
        <div class="modal-stats">
          <div class="modal-stat-card">
            <strong id="preview-quiz-count">0</strong>
            <span>🎓 Quizzes</span>
          </div>
          <div class="modal-stat-card">
            <strong id="preview-correct-count">0</strong>
            <span>✅ Correct Answers</span>
          </div>
          <div class="modal-stat-card">
            <strong id="preview-lightning-count">0</strong>
            <span>⚡ Lightning</span>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>

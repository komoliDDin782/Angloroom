<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AngloRoom - Global Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <script src="assets/js/firebase.js" defer></script>
  <script src="assets/js/chat.js" defer></script>

  <style>
    :root {
      --bg-base: #022c22;
      --accent: #10b981;
      --accent-glow: rgba(16, 185, 129, 0.3);
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg-base);
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* --- Navbar Styling --- */
    header {
      padding: 16px 12px;
      display: flex;
      justify-content: center;
      background: rgba(2, 44, 34, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--glass-border);
      flex-shrink: 0;
    }

    nav { 
      display: flex; 
      gap: clamp(8px, 3vw, 25px);
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      transition: 0.3s;
      white-space: nowrap;
      padding: 6px 4px;
    }

    @media (min-width: 480px) {
      nav a {
        font-size: 15px;
        padding: 6px 8px;
      }
    }

    nav a:hover, nav a.active {
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent-glow);
    }

    /* --- Chat Layout --- */
    .chat-container {
      flex: 1;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      background: var(--glass-bg);
      border-left: 1px solid var(--glass-border);
      border-right: 1px solid var(--glass-border);
      overflow: hidden;
      min-height: 0;
    }

    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--glass-border);
      text-align: center;
      flex-shrink: 0;
    }

    .chat-header h1 {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(20px, 5vw, 26px);
      background: linear-gradient(135deg, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* --- Messages Area --- */
    .messages-box {
      flex: 1;
      padding: 16px 12px;
      padding-bottom: 8px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-height: 0;
      -webkit-overflow-scrolling: touch;
    }

    .messages-box::-webkit-scrollbar { width: 5px; }
    .messages-box::-webkit-scrollbar-track { background: transparent; }
    .messages-box::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

    .msg-wrapper {
      display: flex;
      gap: 10px;
      max-width: 90%;
      align-items: flex-end;
      margin-bottom: 2px;
    }

    @media (min-width: 600px) {
      .msg-wrapper { max-width: 75%; }
    }

    .msg-wrapper.incoming { align-self: flex-start; }
    
    .msg-wrapper.outgoing {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .user-avatar {
      width: 38px;
      height: 38px;
      min-width: 38px;
      border-radius: 50px;
      object-fit: cover;
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.1);
      flex-shrink: 0;
      align-self: flex-end;
    }

    @media (max-width: 480px) {
      .user-avatar {
        width: 34px;
        height: 34px;
        min-width: 34px;
      }
    }

    .msg-body {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
      flex: 1;
    }

    .msg-wrapper.outgoing .msg-body { align-items: flex-end; }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
    }

    .msg-wrapper.outgoing .meta-row {
      flex-direction: row-reverse;
    }

    .meta-info {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
      padding: 0 4px;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.45;
      word-break: break-word;
      overflow-wrap: break-word;
      white-space: pre-wrap;
      display: inline-block;
      max-width: 100%;
      cursor: pointer;
      position: relative;
      transition: transform 0.2s;
    }

    .bubble:hover {
      transform: scale(1.01);
    }

    .msg-timestamp {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 6px;
      display: block;
    }

    .date-separator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 20px 0;
      font-size: 13px;
      color: #94a3b8;
      font-weight: 600;
    }

    .date-separator::before,
    .date-separator::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
    }

    .incoming .bubble {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-top-left-radius: 4px;
    }
      background: linear-gradient(135deg, #0f766e, var(--bg-base));
      border: 1px solid var(--accent);
      box-shadow: 0 0 15px var(--accent-glow);
      border-top-right-radius: 4px;
      color: #fff;
    }

    /* --- Reply Box Context UI --- */
    .reply-quote {
      background: rgba(0, 0, 0, 0.2);
      border-left: 3px solid var(--accent);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 6px;
      max-height: 60px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .outgoing .reply-quote {
      border-left-color: #fff;
      background: rgba(255, 255, 255, 0.08);
    }

    .reply-user-label {
      font-weight: 700;
      font-size: 11px;
      display: block;
      color: var(--accent);
      margin-bottom: 2px;
    }
    .outgoing .reply-user-label {
      color: #fff;
    }

    /* --- Moderation Button --- */
    .admin-delete-btn {
      background: rgba(220, 38, 38, 0.15);
      border: 1px solid rgba(220, 38, 38, 0.3);
      color: #ef4444;
      border-radius: 6px;
      padding: 2px 6px;
      font-size: 11px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: 0.2s;
    }

    .admin-delete-btn:hover {
      background: #dc2626;
      color: #fff;
    }

    /* --- Input Area with Reply Context Ribbon --- */
    .input-area {
      background: rgba(2, 44, 34, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      flex-shrink: 0;
      border-top: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
    }

    .reply-preview-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(16, 185, 129, 0.08);
      border-bottom: 1px solid rgba(16, 185, 129, 0.2);
      padding: 8px 16px;
      font-size: 13px;
    }
    
    .reply-preview-bar.hidden {
      display: none;
    }

    .reply-preview-text {
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 85%;
    }

    .reply-preview-text strong {
      color: var(--accent);
    }

    .cancel-reply-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      padding: 2px 6px;
    }

    .cancel-reply-btn:hover {
      color: #ef4444;
    }

    .input-wrapper {
      padding: 12px 16px;
      padding-bottom: max(16px, calc(env(safe-area-inset-bottom) + 8px));
    }

    .input-form {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .input-form input {
      flex: 1;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--glass-border);
      padding: 14px 18px;
      border-radius: 30px;
      color: #fff;
      font-size: 15px;
      font-family: inherit;
      transition: 0.3s;
      min-width: 0;
      outline: none;
    }

    .input-form input:focus {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .input-form input::placeholder {
      color: #94a3b8;
      opacity: 0.7;
    }

    .send-btn {
      background: var(--accent);
      color: #022c22;
      border: none;
      width: 48px;
      height: 48px;
      min-width: 48px;
      border-radius: 50px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: 0.3s;
      flex-shrink: 0;
      box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2);
    }

    .send-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 18px var(--accent);
    }

    .message-action-menu {
      display: none;
      position: fixed;
      z-index: 1200;
      width: min(240px, 92vw);
      background: rgba(5, 78, 63, 0.96);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 10px 12px;
      box-shadow: 0 24px 48px rgba(0,0,0,0.32);
      gap: 10px;
      color: var(--text-main);
      backdrop-filter: blur(18px);
    }

    .message-action-menu[aria-hidden="false"] {
      display: flex;
    }

    .message-action-menu {
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
    }

    .message-action-menu button {
      width: 100%;
      border: none;
      background: rgba(255,255,255,0.08);
      color: var(--text-main);
      padding: 10px 14px;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 700;
      transition: background 0.2s, transform 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .message-action-menu button:hover {
      background: rgba(16,185,129,0.18);
      transform: translateY(-1px);
    }

    #action-reply,
    #action-clear-reaction {
      width: auto;
      min-width: 160px;
      align-self: center;
    }

    .reaction-grid {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 8px 4px 4px;
      width: 100%;
      scrollbar-width: thin;
      -webkit-overflow-scrolling: touch;
      background: rgba(255,255,255,0.04);
      border-radius: 16px;
    }

    .reaction-grid::-webkit-scrollbar {
      height: 6px;
    }

    .reaction-grid::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.24);
      border-radius: 999px;
    }

    .reaction-grid::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
    }

    .reaction-grid .reaction-btn {
      min-width: 36px;
      width: 36px !important;
      max-width: 36px;
      height: 36px !important;
      min-height: 36px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      cursor: pointer;
      font-size: 16px;
      transition: transform 0.2s, background 0.2s;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
      padding: 0;
      margin: 0;
    }

    .reaction-grid .reaction-btn:hover {
      background: rgba(16,185,129,0.2);
      transform: translateY(-2px);
    }

    .reaction-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .reaction-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 10px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      color: var(--text-main);
      font-size: 14px;
    }

    .reaction-pill.selected {
      background: rgba(16,185,129,0.22);
      border-color: rgba(16,185,129,0.5);
    }

    .message-action-menu .selected {
      background: rgba(16,185,129,0.2);
    }

    @media (max-width: 480px) {
      .input-wrapper {
        padding: 10px 12px;
        padding-bottom: max(14px, calc(env(safe-area-inset-bottom) + 6px));
      }

      .send-btn {
        width: 44px;
        height: 44px;
        min-width: 44px;
      }

      .input-form input {
        padding: 12px 16px;
        font-size: 14px;
      }
    }
    /* ===== MODAL STYLE INTEGRATION FOR CHAT ===== */
#profile-preview-modal {
  position: fixed;
  inset: 0;
  background: rgba(2, 44, 34, 0.95);
  backdrop-filter: blur(20px);
  z-index: 1000;
  display: none; /* Controlled directly by JavaScript strings */
  justify-content: center;
  align-items: center;
  padding: 16px;
}

.modal-content {
  background: #043c2f;
  width: 100%;
  max-width: 400px;
  border-radius: 28px;
  overflow: hidden;
  position: relative;
  border: 1px solid var(--glass-border);
  animation: modalPop 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes modalPop {
  0% { opacity: 0; transform: scale(0.92) translateY(20px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-bg { height: 130px; background-size: cover; background-position: center; }
.modal-profile-pic {
  width: 110px; height: 110px; border-radius: 50%;
  object-fit: cover; border: 4px solid #043c2f;
  margin: -55px auto 0; display: block; position: relative;
}

.modal-info { padding: 20px 24px 30px; text-align: center; }
.modal-info h2 { font-family: 'Outfit', sans-serif; font-size: 24px; color: var(--text-main); }
    #preview-level { color: var(--accent); font-weight: 700; margin-bottom: 10px; font-size: 13px; }
    #preview-about { margin: 0 auto 18px; max-width: 320px; color: var(--text-muted); font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
    .modal-level-progress { display: flex; gap: 6px; justify-content: center; }
.level-step { flex: 1; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.1); }
.level-step.active { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }

.close { position: absolute; top: 12px; right: 18px; font-size: 28px; color: #fff; cursor: pointer; z-index: 10; opacity: 0.6; }
  </style>
</head>
<body>

  <header>
    <nav>
      <a href="main.html">Main</a>
      <a href="quiz.html">Quizzes</a>
      <a href="results.html">Results</a>
      <a href="profile.html">Profile</a>
      <a href="chat.html" class="active">Chat</a>
    </nav>
  </header>

  <main class="chat-container">
    <div class="chat-header">
      <h1>English Speaking Club</h1>
    </div>
    
    <div class="messages-box" id="messages-box">
      </div>

    <div id="message-action-menu" class="message-action-menu" aria-hidden="true">
        <div class="reaction-grid">
        <button type="button" class="reaction-btn" data-emoji="👍">👍</button>
        <button type="button" class="reaction-btn" data-emoji="❤️">❤️</button>
        <button type="button" class="reaction-btn" data-emoji="😂">😂</button>
        <button type="button" class="reaction-btn" data-emoji="🎉">🎉</button>
        <button type="button" class="reaction-btn" data-emoji="😮">😮</button>
        <button type="button" class="reaction-btn" data-emoji="😢">😢</button>
        <button type="button" class="reaction-btn" data-emoji="�">😊</button>
        <button type="button" class="reaction-btn" data-emoji="😎">😎</button>
        <button type="button" class="reaction-btn" data-emoji="🎊">🎊</button>
        <button type="button" class="reaction-btn" data-emoji="💯">💯</button>
      </div>
      <button type="button" id="action-reply"><i class="fas fa-reply"></i> Reply</button>
      <button type="button" id="action-clear-reaction">Remove reaction</button>
    </div>

      <div class="input-area">
      <div class="reply-preview-bar hidden" id="reply-preview-bar">
        <div class="reply-preview-text" id="reply-preview-text"></div>
        <button type="button" class="cancel-reply-btn" id="cancel-reply-btn" title="Cancel reply">
          <i class="fas fa-xmark"></i>
        </button>
      </div>
      
      <div class="input-wrapper">
        <form class="input-form" id="chat-form">
          <input type="text" id="msg-input" placeholder="Type a message in English..." autocomplete="off" required maxlength="500">
          <button type="submit" class="send-btn"><i class="fas fa-paper-plane"></i></button>
        </form>
      </div>
    </div>
  </main>


  <div id="profile-preview-modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <div class="modal-bg" id="preview-bg"></div>
      <img id="preview-pic" class="modal-profile-pic" src="" alt="Profile">
      <div class="modal-info">
        <h2 id="preview-nickname">Nickname</h2>
        <p id="preview-level">Level: —</p>
        <p id="preview-about">About me is not set yet.</p>
        <div class="modal-level-progress">
          <div class="level-step"></div>
          <div class="level-step"></div>
          <div class="level-step"></div>
          <div class="level-step"></div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AngloRoom - Weekly Quizzes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Outfit:wght@700;900&display=swap"
    rel="stylesheet"
  />

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <!-- ✅ Consolidated CSS -->
  <link rel="stylesheet" href="assets/css/global.css">

  <!-- App Scripts -->
  <script src="assets/js/firebase.js" defer></script>
  
  <!-- ✅ Shared Template Loader (MUST be before quiz.js) -->
  <script src="assets/js/template.js" defer></script>
  
  <!-- ✅ Quiz Script (MUST be after template.js) -->
  <script src="assets/js/quiz.js" defer></script>
      <link rel="icon" type="image/x-icon" href="assets/image/logo.ico">
</head>

<body>

  <!-- NAVBAR -->
  <header>
    <nav>
      <a href="main.html">Main</a>
      <a href="quiz.html" class="active">Quizzes</a>
      <a href="results.html">Results</a>
      <a href="profile.html">Profile</a>
      <a href="chat.html">Chat</a>
    </nav>
  </header>

  <!-- TITLE -->
  <h1 class="page-title">Weekly Quizzes</h1>

  <!-- QUIZZES -->
  <div id="quiz-container"></div>

  <!-- VIDEO LESSON -->
  <section class="video-lesson" id="video-lesson" style="display:none;">
    <div class="lesson-header">
      <h2>Infinitive and Gerund</h2>
      <p class="subtitle">Master the art of infinitives and gerunds</p>
    </div>

    <div class="video-container">
      <iframe
        src="https://www.youtube.com/embed/1VaoDZpzWTw?si=TWAj9m9A4jAFnFx4"
        title="YouTube video player"
        allowfullscreen
      ></iframe>
    </div>
  </section>

  <!-- START QUIZ MODAL -->
  <div id="start-confirm-modal" class="start-modal">
    <div class="start-modal-content">
      <h2>Start Quiz?</h2>
      <p>
        Once you begin, you cannot close, refresh, or leave this page
        until the quiz is submitted.
      </p>

      <div class="start-modal-buttons">
        <button id="cancel-start" class="cancel-btn">Cancel</button>
        <button id="confirm-start" class="confirm-btn">Start Quiz</button>
      </div>
    </div>
  </div>

  <!-- QUIZ MODAL -->
  <div class="quiz-modal" id="quiz-modal">
    <div class="quiz-modal-content">
      <span id="close-modal">&times;</span>
      <div id="modal-quiz-container"></div>
    </div>
  </div>

</body>
</html>

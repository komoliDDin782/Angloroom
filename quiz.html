<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AngloRoom - Daily Quizzes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Outfit:wght@700;900&display=swap" rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="assets/js/firebase.js" defer></script>
  <script src="assets/js/quiz.js" defer></script>

  <style>
    :root {
      --bg-base: #022c22;
      --accent: #10b981;
      --accent-glow: rgba(16, 185, 129, 0.4);
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    /* ===== BASE & MOBILE FIXES ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent; /* Removes native gray tap blink */
    }

    body {
      min-height: 100vh;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg-base);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
    }

    /* Ambient Pulsing Glow */
    body::before {
      content: ''; position: fixed; top: -10%; right: -10%; width: 50vw; height: 50vw;
      background: radial-gradient(circle, rgba(16,185,129,0.15) 0%, transparent 70%);
      filter: blur(100px); z-index: -1;
      animation: pulseGlow 8s infinite alternate;
    }

    @keyframes pulseGlow {
      0% { opacity: 0.7; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.1); }
    }

    /* ===== NAVIGATION ===== */
    header {
      padding: clamp(15px, 3vw, 20px);
      display: flex;
      justify-content: center;
      background: rgba(2, 44, 34, 0.85);
      backdrop-filter: blur(15px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--glass-border);
    }

    nav { 
      display: flex; 
      gap: clamp(15px, 5vw, 30px); 
      flex-wrap: wrap;
      justify-content: center;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      font-size: clamp(14px, 3vw, 15px);
      transition: all 0.3s ease;
      padding: 5px;
    }

    nav a:hover, nav a[href="quiz.html"] {
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent-glow);
    }

    /* ===== PAGE TITLE ===== */
    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(32px, 8vw, 48px);
      font-weight: 900;
      margin: clamp(30px, 6vw, 50px) 20px;
      text-align: center;
      background: linear-gradient(135deg, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fadeUp 0.6s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== QUIZ GRID ===== */
    #quiz-container {
      max-width: 1200px;
      margin: 0 auto 50px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: clamp(16px, 4vw, 25px);
      padding: 0 clamp(16px, 4vw, 24px);
    }

    .quiz-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      padding: clamp(30px, 6vw, 40px) 20px;
      text-align: center;
      font-size: clamp(20px, 5vw, 24px);
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      color: #fff;
      border-radius: 24px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: fadeUp 0.8s ease-out backwards;
    }

    /* Glass Shimmer Hover Effect */
    .quiz-card::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 50%; height: 100%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.08), transparent);
      transform: skewX(-20deg);
      transition: left 0.6s ease;
    }

    .quiz-card:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--accent);
      transform: translateY(-8px);
      box-shadow: 0 15px 35px var(--accent-glow);
    }

    .quiz-card:hover::before { left: 150%; }

    /* ===== VIDEO LESSON ===== */
    .video-lesson {
      width: calc(100% - 32px);
      max-width: 800px;
      margin: 40px auto;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      padding: clamp(20px, 5vw, 40px);
      backdrop-filter: blur(30px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      animation: fadeUp 1s ease-out backwards;
    }

    .lesson-header { text-align: center; margin-bottom: 25px; }

    .lesson-header h2 {
      font-family: 'Outfit', sans-serif;
      color: #fff;
      font-size: clamp(24px, 6vw, 32px);
      margin-bottom: 8px;
    }

    .subtitle { color: var(--accent); font-weight: 600; opacity: 0.9; }

    .video-container {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
      height: 0;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 15px 30px rgba(0,0,0,0.5);
      background: #000;
    }

    .video-container iframe {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      border: none;
    }

    /* ===== NATIVE-FEEL MODAL ===== */
    .quiz-modal {
      display: none;
      position: fixed;
      z-index: 1000;
      inset: 0;
      background-color: rgba(2, 44, 34, 0.85);
      backdrop-filter: blur(15px);
      padding: clamp(10px, 3vw, 20px);
      overflow-y: auto;
    }

    .quiz-modal-content {
      background: #043c2f;
      margin: clamp(20px, 5vh, 60px) auto;
      padding: clamp(25px, 6vw, 40px);
      border-radius: 32px;
      max-width: 800px;
      width: 100%;
      border: 1px solid var(--glass-border);
      position: relative;
      color: #fff;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      /* Smooth Entry Animation */
      animation: modalPop 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes modalPop {
      0% { opacity: 0; transform: translateY(40px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    #close-modal {
      position: absolute;
      top: 15px;
      right: 25px;
      font-size: 36px;
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.3s;
      line-height: 1;
      padding: 5px; /* Bigger tap target */
    }

    #close-modal:hover, #close-modal:active { color: var(--accent); }

    /* ===== QUESTION CARDS (Inside Modal) ===== */
    .question-card {
      border-bottom: 1px solid var(--glass-border);
      padding: 30px 0;
    }

    .question-card:last-child { border-bottom: none; }

    .question-text {
      font-size: clamp(18px, 4.5vw, 20px);
      font-weight: 700;
      color: #fff;
      margin-bottom: 20px;
      display: block;
      line-height: 1.5;
    }

    .options {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .submit{
      background: rgba(255, 255, 255, 0.05);
      padding: clamp(16px, 4vw, 20px);
      padding-top: -5px;
      border-radius: 16px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.3s ease;
      color: var(--text-muted);
      font-size: clamp(15px, 4vw, 17px);
      font-weight: 600;
    }
    .submit:hover{
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(16, 185, 129, 0.4);
      color: #fff;
      transform: translateX(5px);
    }
    .options li {
      background: rgba(255, 255, 255, 0.05);
      padding: clamp(16px, 4vw, 20px);
      border-radius: 16px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.3s ease;
      color: var(--text-muted);
      font-size: clamp(15px, 4vw, 17px);
      font-weight: 600;
    }

    .options li:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(16, 185, 129, 0.4);
      color: #fff;
      transform: translateX(5px);
    }

    .options li:active {
      transform: scale(0.98); /* Touch feedback */
    }

    .options li.selected {
      background: var(--accent);
      color: #022c22;
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
      transform: translateX(5px);
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="main.html">Main</a>
      <a href="quiz.html">Quizzes</a>
      <a href="results.html">Results</a>
      <a href="profile.html">Profile</a>
    </nav>
  </header>

  <h1>Weekly Quizzes</h1>
  
  <div id="quiz-container"></div>

  <div class="video-lesson" id="video-lesson" style="display: none;">
    <div class="lesson-header">
        <h2>Infinitive and Gerund</h2>
        <p class="subtitle">Master the art of Infinitive and Gerund</p>
    </div>
    
    <div class="video-container">
      <iframe width="560" height="315" src="https://www.youtube.com/embed/1VaoDZpzWTw?si=TWAj9m9A4jAFnFx4" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </div>
  </div>

  <div id="quiz-modal" class="quiz-modal">
    <div class="quiz-modal-content">
      <span id="close-modal">&times;</span>
      <div id="modal-quiz-container"></div>
    </div>
  </div>

</body>
</html>

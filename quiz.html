<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AngloRoom - Weekly Quizzes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Outfit:wght@700;900&display=swap"
    rel="stylesheet"
  />

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <!-- App -->
  <script src="assets/js/firebase.js" defer></script>
  <script src="assets/js/quiz.js" defer></script>

  <style>
    :root {
      --bg-base: #022c22;
      --accent: #10b981;
      --accent-glow: rgba(16, 185, 129, 0.3);
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg-base);
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* --- Navbar Styling --- */
    header {
      padding: 16px 12px;
      display: flex;
      justify-content: center;
      background: rgba(2, 44, 34, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--glass-border);
      flex-shrink: 0;
    }

    nav { 
      display: flex; 
      gap: clamp(8px, 3vw, 25px);
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      transition: 0.3s;
      white-space: nowrap;
      padding: 6px 4px;
    }

    @media (min-width: 480px) {
      nav a {
        font-size: 15px;
        padding: 6px 8px;
      }
    }

    nav a:hover, nav a.active {
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent-glow);
    }

    /* --- Chat Layout --- */
    .chat-container {
      flex: 1;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      background: var(--glass-bg);
      border-left: 1px solid var(--glass-border);
      border-right: 1px solid var(--glass-border);
      overflow: hidden;
      min-height: 0;
    }

    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--glass-border);
      text-align: center;
      flex-shrink: 0;
    }

    .chat-header h1 {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(20px, 5vw, 26px);
      background: linear-gradient(135deg, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* --- Messages Area --- */
    .messages-box {
      flex: 1;
      padding: 16px 12px;
      padding-bottom: 8px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-height: 0;
      -webkit-overflow-scrolling: touch;
    }

    .messages-box::-webkit-scrollbar { width: 5px; }
    .messages-box::-webkit-scrollbar-track { background: transparent; }
    .messages-box::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

    .msg-wrapper {
      display: flex;
      gap: 10px;
      max-width: 90%;
      align-items: flex-end;
      margin-bottom: 2px;
    }

    @media (min-width: 600px) {
      .msg-wrapper { max-width: 75%; }
    }

    .msg-wrapper.incoming { align-self: flex-start; }
    
    .msg-wrapper.outgoing {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .user-avatar {
      width: 38px;
      height: 38px;
      min-width: 38px;
      border-radius: 50px;
      object-fit: cover;
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.1);
      flex-shrink: 0;
      align-self: flex-end;
    }

    @media (max-width: 480px) {
      .user-avatar {
        width: 34px;
        height: 34px;
        min-width: 34px;
      }
    }

    .msg-body {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
      flex: 1;
    }

    .msg-wrapper.outgoing .msg-body { align-items: flex-end; }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
    }

    .msg-wrapper.outgoing .meta-row {
      flex-direction: row-reverse;
    }

    .meta-info {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
      padding: 0 4px;
    }

    /* --- Bubble Layout Overhaul --- */
    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.45;
      word-break: break-word;
      overflow-wrap: break-word;
      white-space: pre-wrap;
      cursor: pointer;
      position: relative;
      transition: transform 0.2s;
      
      /* Collapse extra white space margins */
      display: block;
      width: fit-content;
      max-width: 100%;
    }

    .bubble:hover {
      transform: scale(1.01);
    }

    .incoming .bubble {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-top-left-radius: 4px;
      align-self: flex-start;
    }

    .outgoing .bubble {
      background: linear-gradient(135deg, #0f766e, var(--bg-base));
      border: 1px solid var(--accent);
      box-shadow: 0 0 15px var(--accent-glow);
      border-top-right-radius: 4px;
      color: #fff;
      align-self: flex-end;
    }

    /* --- Reply Box Context UI --- */
    .reply-quote {
      background: rgba(0, 0, 0, 0.2);
      border-left: 3px solid var(--accent);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 6px;
      max-height: 60px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .outgoing .reply-quote {
      border-left-color: #fff;
      background: rgba(255, 255, 255, 0.08);
    }

    .reply-user-label {
      font-weight: 700;
      font-size: 11px;
      display: block;
      color: var(--accent);
      margin-bottom: 2px;
    }
    .outgoing .reply-user-label {
      color: #fff;
    }

    /* --- Moderation Button --- */
    .admin-delete-btn {
      background: rgba(220, 38, 38, 0.15);
      border: 1px solid rgba(220, 38, 38, 0.3);
      color: #ef4444;
      border-radius: 6px;
      padding: 2px 6px;
      font-size: 11px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: 0.2s;
    }

    .admin-delete-btn:hover {
      background: #dc2626;
      color: #fff;
    }

    /* --- Input Area with Reply Context Ribbon --- */
    .input-area {
      background: rgba(2, 44, 34, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      flex-shrink: 0;
      border-top: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
    }

    .reply-preview-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(16, 185, 129, 0.08);
      border-bottom: 1px solid rgba(16, 185, 129, 0.2);
      padding: 8px 16px;
      font-size: 13px;
    }
    
    .reply-preview-bar.hidden {
      display: none;
    }

    .reply-preview-text {
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 85%;
    }

    .reply-preview-text strong {
      color: var(--accent);
    }

    .cancel-reply-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      padding: 2px 6px;
    }

    .cancel-reply-btn:hover {
      color: #ef4444;
    }

    .input-wrapper {
      padding: 12px 16px;
      padding-bottom: max(16px, calc(env(safe-area-inset-bottom) + 8px));
    }

    .input-form {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .input-form input {
      flex: 1;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--glass-border);
      padding: 14px 18px;
      border-radius: 30px;
      color: #fff;
      font-size: 15px;
      font-family: inherit;
      transition: 0.3s;
      min-width: 0;
      outline: none;
    }

    .input-form input:focus {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .input-form input::placeholder {
      color: #94a3b8;
      opacity: 0.7;
    }

    .send-btn {
      background: var(--accent);
      color: #022c22;
      border: none;
      width: 48px;
      height: 48px;
      min-width: 48px;
      border-radius: 50px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: 0.3s;
      flex-shrink: 0;
      box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2);
    }

    .send-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 18px var(--accent);
    }

    @media (max-width: 480px) {
      .input-wrapper {
        padding: 10px 12px;
        padding-bottom: max(14px, calc(env(safe-area-inset-bottom) + 6px));
      }

      .send-btn {
        width: 44px;
        height: 44px;
        min-width: 44px;
      }

      .input-form input {
        padding: 12px 16px;
        font-size: 14px;
      }
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <header>
    <nav>
      <a href="main.html">Main</a>
      <a href="quiz.html" class="active">Quizzes</a>
      <a href="results.html">Results</a>
      <a href="profile.html">Profile</a>
    </nav>
  </header>

  <!-- TITLE -->
  <h1 class="page-title">
    Weekly Quizzes
  </h1>

  <!-- QUIZZES -->
  <div id="quiz-container"></div>

  <!-- VIDEO LESSON -->
  <section
    class="video-lesson"
    id="video-lesson"
    style="display:none;"
  >

    <div class="lesson-header">
      <h2>Infinitive and Gerund</h2>

      <p class="subtitle">
        Master the art of infinitives and gerunds
      </p>
    </div>

    <div class="video-container">
      <iframe
        src="https://www.youtube.com/embed/1VaoDZpzWTw?si=TWAj9m9A4jAFnFx4"
        title="YouTube video player"
        allowfullscreen
      ></iframe>
    </div>

  </section>

  <!-- MODAL -->
  <div class="quiz-modal" id="quiz-modal">

    <div class="quiz-modal-content">

      <span id="close-modal">
        &times;
      </span>

      <div id="modal-quiz-container"></div>

    </div>

  </div>

</body>
</html>

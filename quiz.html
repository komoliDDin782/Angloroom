<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AngloRoom - Weekly Quizzes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Outfit:wght@700;900&display=swap"
    rel="stylesheet"
  />

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <!-- App -->
  <script src="assets/js/firebase.js" defer></script>
  <script src="assets/js/quiz.js" defer></script>

  <style>
    :root {
      /* Background & Base */
      --bg-base: #022c22;
      --bg-card: rgba(255, 255, 255, 0.04);
      --bg-modal: #043c2f;
      --bg-modal-overlay: rgba(2, 44, 34, 0.85);
      --bg-start-modal-overlay: rgba(0, 0, 0, 0.65);
      --bg-option: rgba(255, 255, 255, 0.05);
      --bg-option-hover: rgba(255, 255, 255, 0.08);
      --bg-cancel-btn: rgba(255, 255, 255, 0.08);
      --bg-cancel-btn-hover: rgba(255, 255, 255, 0.14);
      --bg-video: #000;
      
      /* Accent */
      --accent: #10b981;
      --accent-glow: rgba(16, 185, 129, 0.35);
      --accent-glow-strong: rgba(16, 185, 129, 0.45);
      --accent-bg-light: rgba(16, 185, 129, 0.15);
      --accent-border-light: rgba(16, 185, 129, 0.35);
      --accent-border-modal: rgba(16, 185, 129, 0.3);
      
      /* Danger / Error */
      --danger: #ef4444;
      --danger-glow: rgba(239, 68, 68, 0.25);
      --danger-bg-light: rgba(239, 68, 68, 0.15);
      --danger-text: #f87171;
      
      /* Correct / Success */
      --correct-text: #34d399;
      
      /* Borders */
      --border: rgba(255, 255, 255, 0.08);
      
      /* Text */
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --text-white: #fff;
      --text-on-accent: #022c22;
      
      /* Shadows */
      --shadow-card: 0 10px 30px rgba(0, 0, 0, 0.2);
      --shadow-card-hover: 0 15px 35px var(--accent-glow);
      --shadow-modal: 0 25px 60px rgba(0, 0, 0, 0.45);
      --shadow-start-modal: 0 20px 50px rgba(0, 0, 0, 0.45), 0 0 25px rgba(16, 185, 129, 0.15);
      --shadow-video: 0 20px 45px rgba(0, 0, 0, 0.28);
      --shadow-btn-hover: 0 10px 25px var(--accent-glow);
      --shadow-confirm-btn-hover: 0 10px 20px rgba(16, 185, 129, 0.35);
      --shadow-selected: 0 0 18px var(--accent-glow);
      
      /* Header */
      --header-bg: rgba(2, 44, 34, 0.85);
      
      /* Body Glow */
      --body-glow-color: rgba(16, 185, 129, 0.14);
      
      /* Gradient Text */
      --gradient-text-start: #fff;
      
      /* Card Shine Effect */
      --card-shine: rgba(255, 255, 255, 0.08);
      
      /* Completed Card */
      --completed-opacity: 0.82;
      
      /* Typography */
      --font-primary: 'Plus Jakarta Sans', sans-serif;
      --font-display: 'Outfit', sans-serif;
      
      /* Border Radius */
      --card-radius: 28px;
      --modal-radius: 32px;
      --modal-radius-small: 24px;
      --video-radius: 30px;
      --video-inner-radius: 20px;
      --option-radius: 16px;
      --btn-radius: 18px;
      --start-btn-radius: 14px;
      --start-modal-radius: 28px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      background: var(--bg-base);
      color: var(--text-main);
      font-family: var(--font-primary);
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      top: -10%;
      right: -10%;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(
        circle,
        var(--body-glow-color) 0%,
        transparent 70%
      );
      filter: blur(100px);
      z-index: -1;
      animation: pulse 7s infinite alternate;
    }

    @keyframes pulse {
      from {
        transform: scale(1);
        opacity: 0.7;
      }
      to {
        transform: scale(1.15);
        opacity: 1;
      }
    }

    /* =========================
       NAVBAR
    ========================= */

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--header-bg);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 18px;
      display: flex;
      justify-content: center;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      flex-wrap: wrap;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      transition: 0.25s;
    }

    nav a:hover,
    nav a.active {
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent-glow);
    }

    /* =========================
       TITLE
    ========================= */

    .page-title {
      margin: 42px 20px;
      text-align: center;
      font-size: clamp(34px, 8vw, 52px);
      font-family: var(--font-display);
      font-weight: 900;
      background: linear-gradient(
        135deg,
        var(--gradient-text-start),
        var(--accent)
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fadeUp 0.6s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* =========================
       QUIZ GRID
    ========================= */

    #quiz-container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto 60px;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 22px;
    }

    .quiz-card {
      position: relative;
      overflow: hidden;
      background: var(--bg-card);
      border: 1px solid var(--border);
      backdrop-filter: blur(20px);
      border-radius: var(--card-radius);
      padding: 36px 24px;
      cursor: pointer;
      transition: 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: var(--shadow-card);
    }

    .quiz-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(
        to right,
        transparent,
        var(--card-shine),
        transparent
      );
      transform: skewX(-20deg);
      transition: 0.7s;
    }

    .quiz-card:hover {
      transform: translateY(-8px);
      border-color: var(--accent);
      box-shadow: var(--shadow-card-hover);
    }

    .quiz-card:hover::before {
      left: 150%;
    }

    .quiz-title {
      font-size: 26px;
      font-family: var(--font-display);
      font-weight: 700;
      text-align: center;
    }

    .quiz-status {
      margin-top: 12px;
      text-align: center;
      font-size: 14px;
      color: var(--text-muted);
    }

    .quiz-card.completed {
      opacity: var(--completed-opacity);
      border-color: var(--accent-border-light);
    }

    /* =========================
       VIDEO
    ========================= */

    .video-lesson {
      width: calc(100% - 32px);
      max-width: 800px;
      margin: 0 auto 50px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--video-radius);
      padding: 30px;
      backdrop-filter: blur(24px);
      box-shadow: var(--shadow-video);
    }

    .lesson-header {
      text-align: center;
      margin-bottom: 22px;
    }

    .lesson-header h2 {
      font-size: clamp(24px, 5vw, 34px);
      font-family: var(--font-display);
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--accent);
      font-weight: 600;
    }

    .video-container {
      position: relative;
      overflow: hidden;
      border-radius: var(--video-inner-radius);
      background: var(--bg-video);
      padding-bottom: 56.25%;
      height: 0;
    }

    .video-container iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* =========================
       MODAL
    ========================= */

    .quiz-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      overflow-y: auto;
      padding: 20px;
      background: var(--bg-modal-overlay);
      backdrop-filter: blur(15px);
    }

    .quiz-modal-content {
      position: relative;
      width: 100%;
      max-width: 850px;
      margin: 40px auto;
      background: var(--bg-modal);
      border: 1px solid var(--border);
      border-radius: var(--modal-radius);
      padding: 32px;
      box-shadow: var(--shadow-modal);
      animation: modalPop 0.35s ease;
    }

    @keyframes modalPop {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    #close-modal {
      position: absolute;
      top: 16px;
      right: 24px;
      font-size: 38px;
      line-height: 1;
      cursor: pointer;
      color: var(--text-muted);
      transition: 0.25s;
    }

    #close-modal:hover {
      color: var(--accent);
    }

    /* =========================
       QUESTIONS
    ========================= */

    .question-card {
      padding: 30px 0;
      border-bottom: 1px solid var(--border);
    }

    .question-card:last-child {
      border-bottom: none;
    }

    .question-text {
      display: block;
      margin-bottom: 20px;
      font-size: 20px;
      font-weight: 700;
      line-height: 1.5;
    }

    .options {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .options li {
      padding: 18px 20px;
      border-radius: var(--option-radius);
      background: var(--bg-option);
      border: 1px solid transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: 0.25s;
    }

    .options li:hover {
      background: var(--bg-option-hover);
      border-color: var(--accent-border-light);
      color: var(--text-white);
      transform: translateX(4px);
    }

    .options li.selected {
      background: var(--accent);
      color: var(--text-on-accent);
      border-color: var(--accent);
      box-shadow: var(--shadow-selected);
    }

    /* =========================
       REVIEW MODE
    ========================= */

    .review-options li {
      cursor: default;
      pointer-events: none;
    }

    .correct-answer {
      background: var(--accent-bg-light) !important;
      border-color: var(--accent) !important;
      color: var(--correct-text) !important;
    }

    .wrong-answer {
      background: var(--danger-bg-light) !important;
      border-color: var(--danger) !important;
      color: var(--danger-text) !important;
    }

    /* =========================
       BUTTON
    ========================= */

    .submit-btn {
      width: 100%;
      margin-top: 30px;
      border: none;
      outline: none;
      border-radius: var(--btn-radius);
      padding: 18px 24px;
      background: var(--accent);
      color: var(--text-on-accent);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.25s;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-btn-hover);
    }

    .submit-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    /* =========================
       MOBILE
    ========================= */

    @media (max-width: 768px) {
      .quiz-modal-content {
        padding: 24px;
        border-radius: var(--modal-radius-small);
      }

      .question-text {
        font-size: 18px;
      }

      .options li {
        padding: 16px;
      }
    }

    /* =========================
       START QUIZ MODAL
    ========================= */

    .start-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: var(--bg-start-modal-overlay);
      backdrop-filter: blur(10px);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .start-modal.show {
      display: flex;
    }

    .start-modal-content {
      width: 100%;
      max-width: 450px;
      background: var(--bg-modal);
      border: 1px solid var(--accent-border-modal);
      border-radius: var(--start-modal-radius);
      padding: 32px;
      text-align: center;
      box-shadow: var(--shadow-start-modal);
      animation: startModalPop 0.3s ease;
    }

    .start-modal-content h2 {
      margin-bottom: 14px;
      font-size: 28px;
      font-family: var(--font-display);
    }

    .start-modal-content p {
      color: var(--text-muted);
      line-height: 1.6;
    }

    .start-modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 28px;
    }

    .start-modal-buttons button {
      flex: 1;
      border: none;
      border-radius: var(--start-btn-radius);
      padding: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.25s;
    }

    .cancel-btn {
      background: var(--bg-cancel-btn);
      color: var(--text-white);
    }

    .cancel-btn:hover {
      background: var(--bg-cancel-btn-hover);
    }

    .confirm-btn {
      background: var(--accent);
      color: var(--text-on-accent);
    }

    .confirm-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-confirm-btn-hover);
    }

    @keyframes startModalPop {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <header>
    <nav>
      <a href="main.html">Main</a>
      <a href="quiz.html" class="active">Quizzes</a>
      <a href="results.html">Results</a>
      <a href="profile.html">Profile</a>
    </nav>
  </header>

  <!-- TITLE -->
  <h1 class="page-title"> 
    Weekly Quizzes
  </h1>

  <!-- QUIZZES -->
  <div id="quiz-container"></div>

  <!-- VIDEO LESSON -->
  <section
    class="video-lesson"
    id="video-lesson"
    style="display:none;"
  >
    <div class="lesson-header">
      <h2>Infinitive and Gerund</h2>
      <p class="subtitle">
        Master the art of infinitives and gerunds
      </p>
    </div>

    <div class="video-container">
      <iframe
        src="https://www.youtube.com/embed/1VaoDZpzWTw?si=TWAj9m9A4jAFnFx4"
        title="YouTube video player"
        allowfullscreen
      ></iframe>
    </div>
  </section>

  <!-- START QUIZ MODAL -->
  <div id="start-confirm-modal" class="start-modal">
    <div class="start-modal-content">
      <h2>Start Quiz?</h2>
      <p>
        Once you begin, you cannot close, refresh, or leave this page
        until the quiz is submitted.
      </p>

      <div class="start-modal-buttons">
        <button id="cancel-start" class="cancel-btn">
          Cancel
        </button>

        <button id="confirm-start" class="confirm-btn">
          Start Quiz
        </button>
      </div>
    </div>
  </div>

  <!-- MODAL -->
  <div class="quiz-modal" id="quiz-modal">
    <div class="quiz-modal-content">
      <span id="close-modal">
        &times;
      </span>
      <div id="modal-quiz-container"></div>
    </div>
  </div>

</body>
</html>

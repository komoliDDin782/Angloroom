<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AngloRoom - Leaderboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Outfit:wght@700;900&display=swap" rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="assets/js/firebase.js" defer></script>
  <script src="assets/js/results.js" defer></script>

  <style>
    :root {
      --bg-base: #022c22;
      --accent: #10b981;
      --accent-glow: rgba(16, 185, 129, 0.4);
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --gold: #fbbf24;
      --silver: #94a3b8;
      --bronze: #b45309;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg-base);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      padding-bottom: env(safe-area-inset-bottom);
    }

    body::before {
      content: ''; position: fixed; top: -10%; left: -10%; width: 70vw; height: 70vw;
      background: radial-gradient(circle, rgba(16,185,129,0.12) 0%, transparent 70%);
      filter: blur(80px); z-index: -1;
    }

    header {
      padding: 15px 20px;
      background: rgba(2, 44, 34, 0.85);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--glass-border);
    }

    nav { display: flex; justify-content: center; gap: clamp(10px, 5vw, 30px); }
    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      transition: 0.3s;
      padding: 8px 4px;
    }
    nav a:hover, nav a.active { color: var(--accent); text-shadow: 0 0 10px var(--accent-glow); }

    h1 {
      font-family: 'Outfit', sans-serif;
      text-align: center;
      font-size: clamp(28px, 10vw, 42px);
      margin: 30px 20px 10px;
      background: linear-gradient(135deg, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #results-container {
      width: 100%;
      max-width: 900px;
      margin: 0 auto 40px;
      padding: 0 16px;
      animation: fadeUp 0.8s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .results-table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
    .results-table th {
      padding: 12px;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 1px;
      text-align: center;
    }

    .results-table tr {
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    .results-table td {
      padding: 14px;
      text-align: center;
      border-top: 1px solid var(--glass-border);
      border-bottom: 1px solid var(--glass-border);
    }

    .results-table td:first-child { border-left: 1px solid var(--glass-border); border-top-left-radius: 14px; border-bottom-left-radius: 14px; }
    .results-table td:last-child { border-right: 1px solid var(--glass-border); border-top-right-radius: 14px; border-bottom-right-radius: 14px; }

    .rank { font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 18px; }

    /* Row Coloring Fix */
    .gold-row { border: 1px solid var(--gold) !important; box-shadow: inset 0 0 15px rgba(251, 191, 36, 0.1); }
    .gold-row .rank { color: var(--gold); }
    .silver-row .rank { color: var(--silver); }
    .bronze-row .rank { color: var(--bronze); }

    .nickname-cell {
      display: flex;
      align-items: center;
      gap: 12px;
      text-align: left;
      font-weight: 600;
    }

    .profile-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--glass-border);
      cursor: pointer;
    }

    /* ===== MODAL ===== */
    #profile-preview-modal {
      position: fixed;
      inset: 0;
      background: rgba(2, 44, 34, 0.95);
      backdrop-filter: blur(20px);
      z-index: 1000;
      display: none;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    #profile-preview-modal.active { display: flex; }

    .modal-content {
      background: #043c2f;
      width: 100%;
      max-width: 400px;
      border-radius: 28px;
      overflow: hidden;
      position: relative;
      border: 1px solid var(--glass-border);
      animation: modalPop 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes modalPop {
      0% { opacity: 0; transform: scale(0.92) translateY(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-bg { height: 130px; background-size: cover; background-position: center; }
    .modal-profile-pic {
      width: 110px; height: 110px; border-radius: 50%;
      object-fit: cover; border: 4px solid #043c2f;
      margin: -55px auto 0; display: block; position: relative;
    }

    .modal-info { padding: 20px 24px 30px; text-align: center; }
    .modal-info h2 { font-family: 'Outfit', sans-serif; font-size: 24px; }
    #preview-level { color: var(--accent); font-weight: 700; margin-bottom: 15px; font-size: 13px; }

    .modal-level-progress { display: flex; gap: 6px; justify-content: center; }
    .level-step { flex: 1; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.1); }
    .level-step.active { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }

    .close { position: absolute; top: 12px; right: 18px; font-size: 28px; color: #fff; cursor: pointer; z-index: 10; opacity: 0.6; }

    @media (max-width: 500px) {
      h1 { margin: 15px 0 5px; font-size: 24px; }
      
      #results-container { padding: 0 8px; }

      .results-table { border-spacing: 0 4px; }

      /* Hide "Quiz" and "Total" on small screens to save space */
      .results-table th:nth-child(3), 
      .results-table td:nth-child(3),
      .results-table th:nth-child(6),
      .results-table td:nth-child(6) {
        display: none;
      }

      .results-table th { padding: 5px; font-size: 10px; }
      
      .results-table td { 
        padding: 8px 4px; 
        font-size: 12px; 
      }

      .profile-icon { width: 28px; height: 28px; border-width: 1px; }

      .nickname-cell { 
        gap: 6px; 
        max-width: 100px; /* Prevents long names from breaking the line */
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .rank { font-size: 14px; width: 40px; }
    }

    .loader { display: flex; justify-content: center; padding: 40px; }
    .loader span { animation: hideAndSeek 1s alternate infinite; }
    @keyframes hideAndSeek { 0% { opacity: 0.3; } 100% { opacity: 1; } }
  </style>
</head>

<body>
  <header>
    <nav>
      <a href="main.html">Main</a>
      <a href="quiz.html">Quizzes</a>
      <a href="results.html" class="active">Results</a>
      <a href="profile.html">Profile</a>
    </nav>
  </header>

  <div id="results-container">
    <h1>Leaderboard</h1>
    <div class="loader">
      <span style="color: var(--accent); font-weight: 900; letter-spacing: 3px; font-size: 12px;">LOADING...</span>
    </div>
  </div>

  <div id="profile-preview-modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <div class="modal-bg" id="preview-bg"></div>
      <img id="preview-pic" class="modal-profile-pic" src="" alt="Profile">
      <div class="modal-info">
        <h2 id="preview-nickname">Nickname</h2>
        <p id="preview-level">Level: —</p>
        <div class="modal-level-progress">
          <div class="level-step"></div><div class="level-step"></div><div class="level-step"></div><div class="level-step"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.querySelector('.close').onclick = () => document.getElementById('profile-preview-modal').classList.remove('active');
    window.onclick = (e) => { if (e.target.id === 'profile-preview-modal') e.target.classList.remove('active'); };
  </script>
</body>
</html>

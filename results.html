<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>AngloRoom - Leaderboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Outfit:wght@700;900&display=swap"
    rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="assets/js/firebase.js" defer></script>
  <script src="assets/js/results.js" defer></script>

  <style>
    :root {
      /* Background & Base */
      --bg-base: #022c22;
      --bg-glass: rgba(255, 255, 255, 0.03);
      --bg-glass-hover: rgba(255, 255, 255, 0.05);
      --bg-glass-strong: rgba(255, 255, 255, 0.06);
      --bg-modal: #043c2f;
      --bg-modal-overlay: rgba(2, 44, 34, 0.95);
      --bg-stat-card: rgba(255, 255, 255, 0.08);
      --bg-current-user: rgba(16, 185, 129, 0.1);
      --bg-level-inactive: rgba(255, 255, 255, 0.1);
      
      /* Accent */
      --accent: #10b981;
      --accent-glow: rgba(16, 185, 129, 0.4);
      --accent-glow-level: rgba(16, 185, 129, 0.5);
      
      /* Glass & Borders */
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-border-light: rgba(255, 255, 255, 0.12);
      
      /* Text */
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --text-white: #fff;
      --text-on-accent: #fff;
      
      /* Podium Colors */
      --gold: #fbbf24;
      --gold-glow: rgba(251, 191, 36, 0.5);
      --gold-bg: rgba(251, 191, 36, 0.1);
      --gold-border-light: rgba(255, 255, 255, 0.3);
      
      --silver: #94a3b8;
      --silver-glow: rgba(148, 163, 184, 0.4);
      --silver-bg: rgba(203, 213, 225, 0.1);
      --silver-border-light: rgba(255, 255, 255, 0.2);
      
      --bronze: #b45309;
      --bronze-glow: rgba(180, 83, 9, 0.4);
      --bronze-bg: rgba(217, 119, 6, 0.1);
      
      /* Podium Gradient Colors */
      --podium-first-start: #fbbf24;
      --podium-first-end: rgba(251, 191, 36, 0.1);
      --podium-second-start: #cbd5e1;
      --podium-second-end: rgba(203, 213, 225, 0.1);
      --podium-third-start: #d97706;
      --podium-third-end: rgba(217, 119, 6, 0.1);
      
      /* Shadows */
      --shadow-tab-active: 0 4px 15px var(--accent-glow);
      --shadow-podium-rank: 0 2px 10px rgba(0, 0, 0, 0.3);
      --shadow-stat-card: 0 10px 30px rgba(0, 0, 0, 0.12);
      --shadow-gold-row: inset 0 0 15px rgba(251, 191, 36, 0.1);
      
      /* Header */
      --header-bg: rgba(2, 44, 34, 0.85);
      
      /* Body Glow */
      --body-glow-color: rgba(16, 185, 129, 0.12);
      
      /* Gradient Text */
      --gradient-text-start: #fff;
      
      /* Modal */
      --modal-pic-border: #043c2f;
      --modal-close-color: #fff;
      --modal-close-opacity: 0.6;
      --modal-stat-text: #d1d5db;
      
      /* Typography */
      --font-primary: 'Plus Jakarta Sans', sans-serif;
      --font-display: 'Outfit', sans-serif;
      
      /* Border Radius */
      --card-radius: 14px;
      --modal-radius: 28px;
      --stat-radius: 18px;
      --tab-radius: 16px;
      --tab-btn-radius: 12px;
      --podium-bar-radius: 8px;
      --level-step-radius: 3px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: var(--font-primary);
      background-color: var(--bg-base);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      padding-bottom: env(safe-area-inset-bottom);
    }

    body::before {
      content: '';
      position: fixed;
      top: -10%;
      left: -10%;
      width: 70vw;
      height: 70vw;
      background: radial-gradient(circle, var(--body-glow-color) 0%, transparent 70%);
      filter: blur(80px);
      z-index: -1;
    }

    header {
      padding: 15px 20px;
      background: var(--header-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--glass-border);
    }

    nav {
      display: flex;
      justify-content: center;
      gap: clamp(10px, 5vw, 30px);
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      transition: 0.3s;
      padding: 8px 4px;
    }

    nav a:hover,
    nav a.active {
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent-glow);
    }

    h1 {
      font-family: var(--font-display);
      text-align: center;
      font-size: clamp(28px, 10vw, 42px);
      margin: 30px 20px 10px;
      background: linear-gradient(135deg, var(--gradient-text-start), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h2 {
      font-family: var(--font-display);
      text-align: center;
      font-size: 16px;
      margin: 10px 0;
      color: var(--text-muted);
    }

    #results-container {
      width: 100%;
      max-width: 900px;
      margin: 0 auto 40px;
      padding: 0 16px;
      animation: fadeUp 0.8s ease-out;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== TAB SWITCHER ===== */
    .tab-switcher {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin: 20px 16px 10px;
      background: var(--bg-glass);
      border-radius: var(--tab-radius);
      padding: 6px;
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .tab-btn {
      flex: 1;
      max-width: 150px;
      padding: 10px 12px;
      border: none;
      border-radius: var(--tab-btn-radius);
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font-primary);
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: 0.3s;
      white-space: nowrap;
    }

    .tab-btn.active {
      background: var(--accent);
      color: var(--text-on-accent);
      box-shadow: var(--shadow-tab-active);
    }

    .tab-btn:hover:not(.active) {
      color: var(--text-main);
      background: var(--bg-glass-hover);
    }

    /* ===== LEADERBOARD CONTENT WRAPPER ===== */
    #leaderboard-content {
      animation: fadeUp 0.5s ease-out;
    }

    /* ===== PODIUM ===== */
    .podium-container {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: clamp(6px, 2vw, 16px);
      padding: 10px 8px 25px;
      margin: 15px 0 5px;
    }

    .podium-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      flex: 1;
      max-width: 130px;
      animation: podiumRise 0.6s ease-out backwards;
    }

    .podium-item:nth-child(1) { animation-delay: 0.1s; }
    .podium-item:nth-child(2) { animation-delay: 0.3s; }
    .podium-item:nth-child(3) { animation-delay: 0.5s; }

    @keyframes podiumRise {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .podium-avatar {
      width: clamp(50px, 10vw, 70px);
      height: clamp(50px, 10vw, 70px);
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--glass-border);
      margin-bottom: 6px;
      cursor: pointer;
      transition: transform 0.3s;
    }

    .podium-avatar:hover {
      transform: scale(1.15);
    }

    .podium-item.first-place .podium-avatar {
      width: clamp(60px, 13vw, 85px);
      height: clamp(60px, 13vw, 85px);
      border-color: var(--gold);
      box-shadow: 0 0 22px var(--gold-glow);
    }

    .podium-item.second-place .podium-avatar {
      border-color: var(--silver);
      box-shadow: 0 0 18px var(--silver-glow);
    }

    .podium-item.third-place .podium-avatar {
      border-color: var(--bronze);
      box-shadow: 0 0 18px var(--bronze-glow);
    }

    .podium-bar {
      width: 100%;
      border-radius: var(--podium-bar-radius) var(--podium-bar-radius) 0 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 4px;
    }

    .podium-item.first-place .podium-bar {
      height: clamp(70px, 18vw, 110px);
      background: linear-gradient(180deg, var(--podium-first-start) 0%, var(--podium-first-end) 100%);
      border-top: 2px solid var(--gold-border-light);
    }

    .podium-item.second-place .podium-bar {
      height: clamp(50px, 13vw, 80px);
      background: linear-gradient(180deg, var(--podium-second-start) 0%, var(--podium-second-end) 100%);
      border-top: 2px solid var(--silver-border-light);
    }

    .podium-item.third-place .podium-bar {
      height: clamp(42px, 10vw, 65px);
      background: linear-gradient(180deg, var(--podium-third-start) 0%, var(--podium-third-end) 100%);
      border-top: 2px solid var(--silver-border-light);
    }

    .podium-rank {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: clamp(16px, 4vw, 26px);
      color: var(--text-white);
      text-shadow: var(--shadow-podium-rank);
    }

    .podium-nickname {
      font-weight: 600;
      font-size: clamp(10px, 2.5vw, 13px);
      margin-top: 4px;
      color: var(--text-main);
      max-width: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .podium-metric {
      font-size: clamp(9px, 2vw, 11px);
      color: rgba(255, 255, 255, 0.7);
      font-weight: 700;
      margin-top: 2px;
    }

    /* Reorder for proper podium layout: 2nd - 1st - 3rd */
    .podium-item.second-place { order: 1; }
    .podium-item.first-place { order: 2; }
    .podium-item.third-place { order: 3; }

    /* ===== TABLE ===== */
    .results-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 8px;
    }

    .results-table th {
      padding: 10px 8px;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 1px;
      text-align: center;
    }

    .results-table tr {
      background: var(--bg-glass);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    .results-table tr:hover {
      background: var(--bg-glass-strong);
    }

    .results-table td {
      padding: 12px 8px;
      text-align: center;
      border-top: 1px solid var(--glass-border);
      border-bottom: 1px solid var(--glass-border);
    }

    .results-table td:first-child {
      border-left: 1px solid var(--glass-border);
      border-top-left-radius: var(--card-radius);
      border-bottom-left-radius: var(--card-radius);
    }

    .results-table td:last-child {
      border-right: 1px solid var(--glass-border);
      border-top-right-radius: var(--card-radius);
      border-bottom-right-radius: var(--card-radius);
    }

    .rank {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 16px;
    }

    .gold-row {
      border: 1px solid var(--gold) !important;
      box-shadow: var(--shadow-gold-row);
    }

    .gold-row .rank {
      color: var(--gold);
    }

    .silver-row .rank {
      color: var(--silver);
    }

    .bronze-row .rank {
      color: var(--bronze);
    }

    .current-user-row {
      background: var(--bg-current-user) !important;
      border-color: var(--accent) !important;
    }

    .nickname-cell {
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
      font-weight: 600;
    }

    .profile-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--glass-border);
      cursor: pointer;
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .profile-icon:hover {
      transform: scale(1.15);
    }

    .metric-highlight {
      font-weight: 700;
      color: var(--accent);
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: 50px 20px;
    }

    .empty-state .icon {
      font-size: 48px;
      display: block;
      margin-bottom: 12px;
    }

    /* ===== MODAL ===== */
    #profile-preview-modal {
      position: fixed;
      inset: 0;
      background: var(--bg-modal-overlay);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 1000;
      display: none;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    #profile-preview-modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--bg-modal);
      width: 100%;
      max-width: 400px;
      border-radius: var(--modal-radius);
      overflow: hidden;
      position: relative;
      border: 1px solid var(--glass-border);
      animation: modalPop 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes modalPop {
      0% {
        opacity: 0;
        transform: scale(0.92) translateY(20px);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .modal-bg {
      height: 130px;
      background-size: cover;
      background-position: center;
    }

    .modal-profile-pic {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--modal-pic-border);
      margin: -55px auto 0;
      display: block;
      position: relative;
    }

    .modal-info {
      padding: 20px 24px 30px;
      text-align: center;
    }

    .modal-info h2 {
      font-family: var(--font-display);
      font-size: 24px;
      background: none;
      -webkit-text-fill-color: var(--text-main);
      color: var(--text-main);
      margin: 5px 0;
    }

    #preview-level {
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 10px;
      font-size: 13px;
    }

    #preview-about {
      margin: 0 auto 18px;
      max-width: 320px;
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .modal-stats {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .modal-stat-card {
      min-width: 100px;
      flex: 1 1 100px;
      padding: 14px 12px;
      border-radius: var(--stat-radius);
      background: var(--bg-stat-card);
      border: 1px solid var(--glass-border-light);
      box-shadow: var(--shadow-stat-card);
    }

    .modal-stat-card strong {
      display: block;
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 6px;
      color: var(--text-white);
    }

    .modal-stat-card span {
      display: block;
      color: var(--modal-stat-text);
      font-size: 13px;
    }

    .modal-level-progress {
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    .level-step {
      flex: 1;
      height: 6px;
      border-radius: var(--level-step-radius);
      background: var(--bg-level-inactive);
    }

    .level-step.active {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow-level);
    }

    .close {
      position: absolute;
      top: 12px;
      right: 18px;
      font-size: 28px;
      color: var(--modal-close-color);
      cursor: pointer;
      z-index: 10;
      opacity: var(--modal-close-opacity);
      transition: opacity 0.2s;
    }

    .close:hover {
      opacity: 1;
    }

    .loader {
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .loader span {
      animation: hideAndSeek 1s alternate infinite;
    }

    @keyframes hideAndSeek {
      0% { opacity: 0.3; }
      100% { opacity: 1; }
    }

    /* ===== MOBILE ===== */
    @media (max-width: 500px) {
      h1 {
        margin: 15px 0 5px;
        font-size: 24px;
      }

      #results-container {
        padding: 0 8px;
      }

      .tab-switcher {
        gap: 3px;
        padding: 4px;
        border-radius: var(--tab-btn-radius);
      }

      .tab-btn {
        padding: 8px 6px;
        font-size: 11px;
        border-radius: 10px;
      }

      .podium-container {
        gap: 3px;
        padding: 8px 2px 16px;
      }

      .podium-nickname {
        font-size: 9px;
        max-width: 70px;
      }

      .podium-metric {
        font-size: 8px;
      }

      .results-table {
        border-spacing: 0 4px;
      }

      .results-table th {
        padding: 5px 3px;
        font-size: 9px;
        letter-spacing: 0.5px;
      }

      .results-table td {
        padding: 8px 4px;
        font-size: 11px;
      }

      .profile-icon {
        width: 28px;
        height: 28px;
        border-width: 1px;
      }

      .nickname-cell {
        gap: 5px;
        max-width: 90px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .rank {
        font-size: 13px;
        width: 35px;
      }

      /* Hide less important columns on mobile */
      .results-table th.col-extra,
      .results-table td.col-extra {
        display: none;
      }
    }

    @media (prefers-color-scheme: dark) {
      .podium-bar {
        filter: brightness(1.2) saturate(1.2);
      }
    }
  </style>
</head>

<body>
  <header>
    <nav>
      <a href="main.html">Main</a>
      <a href="quiz.html">Quizzes</a>
      <a href="results.html" class="active">Results</a>
      <a href="profile.html">Profile</a>
      <a href="chat.html">Chat</a>
    </nav>
  </header>

  <div id="results-container">
    <h1>Leaderboard</h1>

    <!-- Tab Switcher -->
    <div class="tab-switcher">
      <button class="tab-btn active" data-tab="weekly">🏆 Weekly</button>
      <button class="tab-btn" data-tab="correct">✅ Correct</button>
      <button class="tab-btn" data-tab="lightning">⚡ Lightning</button>
    </div>

    <!-- Dynamic content loaded by JS -->
    <div id="leaderboard-content">
      <div class="loader">
        <span style="color: var(--accent); font-weight: 900; letter-spacing: 3px; font-size: 12px;">LOADING...</span>
      </div>
    </div>
  </div>

  <!-- Profile Preview Modal -->
  <div id="profile-preview-modal" role="dialog" aria-modal="true" aria-labelledby="preview-nickname">
    <div class="modal-content">
      <span class="close" aria-label="Close modal">&times;</span>
      <div class="modal-bg" id="preview-bg"></div>
      <img id="preview-pic" class="modal-profile-pic" src="" alt="Profile picture">
      <div class="modal-info">
        <h2 id="preview-nickname">Nickname</h2>
        <p id="preview-level">Level: —</p>
        <p id="preview-about">About me is not set yet.</p>
        <div class="modal-level-progress">
          <div class="level-step"></div>
          <div class="level-step"></div>
          <div class="level-step"></div>
          <div class="level-step"></div>
        </div>
        <div class="modal-stats">
          <div class="modal-stat-card">
            <strong id="preview-quiz-count">0</strong>
            <span>🎓 Quizzes</span>
          </div>
          <div class="modal-stat-card">
            <strong id="preview-correct-count">0</strong>
            <span>✅ Correct</span>
          </div>
          <div class="modal-stat-card">
            <strong id="preview-lightning-count">0</strong>
            <span>⚡ Lightning</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</html>

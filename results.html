<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>AngloRoom - Leaderboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Outfit:wght@700;900&display=swap" rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="assets/js/firebase.js" defer></script>
  <script src="assets/js/results.js" defer></script>

  <style>
    :root {
      --bg-base: #022c22;
      --accent: #10b981;
      --accent-glow: rgba(16, 185, 129, 0.4);
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --gold: #fbbf24;
      --silver: #94a3b8;
      --bronze: #b45309;
    }

    /* ===== BASE STYLES ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg-base);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* Ambient Background */
    body::before {
      content: ''; position: fixed; top: -10%; left: -10%; width: 50vw; height: 50vw;
      background: radial-gradient(circle, rgba(16,185,129,0.1) 0%, transparent 70%);
      filter: blur(100px); z-index: -1;
    }

    /* ===== NAVIGATION ===== */
    header {
      padding: 20px;
      display: flex;
      justify-content: center;
      background: rgba(2, 44, 34, 0.85);
      backdrop-filter: blur(15px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--glass-border);
    }

    nav { display: flex; gap: clamp(15px, 4vw, 30px); }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: 0.3s;
    }

    nav a:hover, nav a[href="results.html"] {
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent-glow);
    }

    /* ===== HEADER ===== */
    h1 {
      font-family: 'Outfit', sans-serif;
      text-align: center;
      font-size: clamp(32px, 8vw, 42px);
      margin: 40px 20px 20px;
      background: linear-gradient(135deg, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ===== LEADERBOARD TABLE ===== */
    #results-container {
      width: 100%;
      max-width: 900px;
      margin: 0 auto 60px;
      padding: 0 20px;
      animation: fadeUp 0.8s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .results-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 12px; /* Gap between rows */
    }

    .results-table th {
      padding: 15px;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 1px;
      text-align: center;
    }

    .results-table tr {
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      transition: transform 0.3s ease;
    }

    .results-table td {
      padding: 15px;
      text-align: center;
      border-top: 1px solid var(--glass-border);
      border-bottom: 1px solid var(--glass-border);
    }

    .results-table td:first-child { 
      border-left: 1px solid var(--glass-border); 
      border-top-left-radius: 16px; 
      border-bottom-left-radius: 16px; 
    }
    .results-table td:last-child { 
      border-right: 1px solid var(--glass-border); 
      border-top-right-radius: 16px; 
      border-bottom-right-radius: 16px; 
    }

    /* Rank Styling */
    .rank {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 20px;
    }

    /* Top 3 Medals */
    .gold-row { border: 1px solid var(--gold) !important; box-shadow: 0 0 15px rgba(251, 191, 36, 0.1); }
    .gold-row .rank { color: var(--gold); }
    
    .silver-row .rank { color: var(--silver); }
    .bronze-row .rank { color: var(--bronze); }

    .nickname-cell {
      display: flex;
      align-items: center;
      gap: 15px;
      text-align: left;
      font-weight: 600;
    }

    .results-table img.profile-icon {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--glass-border);
      cursor: pointer;
      transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .results-table img.profile-icon:hover {
      transform: scale(1.2);
      border-color: var(--accent);
    }

    /* ===== MODAL ===== */
    #profile-preview-modal {
      position: fixed;
      inset: 0;
      background: rgba(2, 44, 34, 0.9);
      backdrop-filter: blur(15px);
      z-index: 1000;
      display: none;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    #profile-preview-modal.active { display: flex; }

    .modal-content {
      background: #043c2f;
      width: 100%;
      max-width: 450px;
      border-radius: 32px;
      overflow: hidden;
      position: relative;
      border: 1px solid var(--glass-border);
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      animation: modalPop 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes modalPop {
      0% { opacity: 0; transform: scale(0.9) translateY(30px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-bg {
      height: 160px;
      background-size: cover;
      background-position: center;
    }

    .modal-profile-pic {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid #043c2f;
      margin-top: -70px;
      position: relative;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    .modal-info { padding: 20px 30px 40px; text-align: center; }

    .modal-info h2 { font-family: 'Outfit', sans-serif; font-size: 28px; margin-bottom: 5px; }

    #preview-level { color: var(--accent); font-weight: 700; margin-bottom: 20px; text-transform: uppercase; font-size: 14px; }

    .modal-level-progress { display: flex; gap: 8px; justify-content: center; }

    .level-step { flex: 1; height: 8px; border-radius: 4px; background: rgba(255,255,255,0.1); }
    .level-step.active { background: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }

    .close {
      position: absolute; top: 15px; right: 20px; font-size: 30px;
      color: #fff; cursor: pointer; z-index: 10; opacity: 0.7;
    }

    /* ===== MOBILE ADAPTATION ===== */
    @media (max-width: 600px) {
      .results-table thead { display: none; } /* Hide headers on mobile */
      
      .results-table td { display: block; text-align: right; padding: 10px 20px; border: none; }
      
      .results-table td::before {
        content: attr(data-label);
        float: left;
        color: var(--text-muted);
        font-weight: 600;
        font-size: 12px;
      }

      .nickname-cell { justify-content: flex-end; padding-top: 20px !important; }
      
      .results-table td:last-child { padding-bottom: 20px !important; }
      
      .results-table tr {
        display: block;
        margin-bottom: 20px;
        border-radius: 24px !important;
        border: 1px solid var(--glass-border);
      }
    }

    /* Loader Styles */
    .loader { display: flex; justify-content: center; padding: 50px; }
    .loader span { animation: hideAndSeek 1s alternate infinite cubic-bezier(0.86, 0, 0.07, 1); }
    @keyframes hideAndSeek { 0% { transform: translateY(10px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
  </style>
</head>

<body>

  <header>
    <nav>
      <a href="main.html">Main</a>
      <a href="quiz.html">Quizzes</a>
      <a href="results.html">Results</a>
      <a href="profile.html">Profile</a>
    </nav>
  </header>

  <div id="results-container">
    <h1>Leaderboard</h1>

    <div class="loader">
      <span style="color: var(--accent); font-weight: 900; letter-spacing: 5px;">LOADING...</span>
    </div>

    </div>

  <div id="profile-preview-modal">
    <div class="modal-content">
      <span class="close">&times;</span>

      <div class="modal-bg" id="preview-bg" style="background-image: url('assets/image/back4.jpg');"></div>

      <img id="preview-pic" class="modal-profile-pic" src="assets/image/logo.jpg" alt="Profile">

      <div class="modal-info">
        <h2 id="preview-nickname">Nickname</h2>
        <p id="preview-level">Level: —</p>

        <div class="modal-level-progress">
          <div class="level-step"></div> <div class="level-step"></div> <div class="level-step"></div> <div class="level-step"></div> </div>
      </div>
    </div>
  </div>

  <script>
    // Simple Close Logic
    document.querySelector('.close').onclick = () => {
      document.getElementById('profile-preview-modal').classList.remove('active');
    };
    
    window.onclick = (event) => {
      const modal = document.getElementById('profile-preview-modal');
      if (event.target == modal) modal.classList.remove('active');
    };
  </script>

</body>
</html>

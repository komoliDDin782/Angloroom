<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AngloRoom - Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --bg-base: #022c22;
      --accent: #10b981;
      --accent-glow: rgba(16, 185, 129, 0.4);
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --danger: #ef4444;
    }

    /* ===== BASE ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      min-height: 100vh;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg-base);
      color: var(--text-main);
      overflow-x: hidden;
    }

    body::before {
      content: ''; position: fixed; top: -10%; left: -10%; width: 50vw; height: 50vw;
      background: radial-gradient(circle, rgba(16,185,129,0.15) 0%, transparent 70%);
      filter: blur(100px); z-index: -1;
      animation: pulseGlow 8s infinite alternate;
    }

    @keyframes pulseGlow {
      0% { opacity: 0.7; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.1); }
    }

    /* ===== NAVIGATION ===== */
    header {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(2, 44, 34, 0.8);
      backdrop-filter: blur(15px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--glass-border);
    }

    .nav-logo { font-family: 'Outfit', sans-serif; font-weight: 900; color: var(--accent); text-decoration: none; }
    
    #logout-btn {
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.2);
      padding: 8px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      transition: 0.3s;
    }

    #logout-btn:hover { background: var(--danger); color: white; }

    /* ===== MAIN DASHBOARD ===== */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
      animation: fadeUp 0.8s ease forwards;
    }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(32px, 8vw, 42px);
      text-align: center;
      margin-bottom: 40px;
      background: linear-gradient(135deg, #fff, var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .admin-main {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .admin-main button {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      padding: 40px 20px;
      border-radius: 24px;
      color: white;
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.4s ease;
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .admin-main button i { font-size: 32px; color: var(--accent); transition: 0.3s; }

    .admin-main button:hover {
      transform: translateY(-10px);
      border-color: var(--accent);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    
    .admin-main button:hover i { transform: scale(1.2); text-shadow: 0 0 15px var(--accent-glow); }

    /* ===== OVERLAYS ===== */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      margin: auto;
      width: min(95%, 1000px);
      height: 85vh;
      background: rgba(2, 44, 34, 0.95);
      backdrop-filter: blur(30px);
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      padding: 30px;
      overflow-y: auto;
      z-index: 1000;
      box-shadow: 0 50px 100px rgba(0,0,0,0.6);
    }

    .close-btn {
      position: sticky; top: 0; float: right;
      background: var(--danger); color: white; border: none;
      width: 40px; height: 40px; border-radius: 12px; cursor: pointer;
    }

    h2 { font-family: 'Outfit', sans-serif; color: var(--accent); margin: 20px 0; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; }

    /* ===== TABLES ===== */
    table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
    th { padding: 15px; color: var(--text-muted); font-size: 13px; text-transform: uppercase; text-align: left; }
    td { background: rgba(255,255,255,0.03); padding: 15px; border-top: 1px solid var(--glass-border); border-bottom: 1px solid var(--glass-border); }
    td:first-child { border-left: 1px solid var(--glass-border); border-radius: 15px 0 0 15px; }
    td:last-child { border-right: 1px solid var(--glass-border); border-radius: 0 15px 15px 0; }

    .student-pic { width: 45px; height: 45px; border-radius: 12px; border: 2px solid var(--accent); object-fit: cover; }

    /* Form Elements */
    .level-select {
      background: #011a14; color: white; border: 1px solid var(--glass-border);
      padding: 8px; border-radius: 8px; outline: none;
    }

    .action-btn {
      display: block; margin: 30px auto; padding: 15px 40px;
      background: var(--accent); color: var(--bg-base); font-weight: 800;
      border-radius: 14px; border: none; cursor: pointer;
    }

    .delete-result-btn { background: none; border: 1px solid var(--danger); color: var(--danger); padding: 5px 10px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
    .delete-result-btn:hover { background: var(--danger); color: white; }

    @media (max-width: 600px) { .overlay { padding: 15px; } table { font-size: 12px; } }
  </style>
</head>
<body>

  <header>
    <a href="main.html" class="nav-logo">ANGLOROOM ADMIN</a>
    <div id="logout-btn"><i class="fas fa-sign-out-alt"></i> Exit</div>
  </header>

  <main>
    <h1>Control Center</h1>

    <div class="admin-main">
      <button id="btn-results">
        <i class="fas fa-chart-line"></i>
        <span>Exam Results</span>
      </button>
      
      <button id="btn-students">
        <i class="fas fa-users"></i>
        <span>Manage Students</span>
      </button>

      <button id="btn-new-students">
        <i class="fas fa-user-plus"></i>
        <span>New Registrations</span>
      </button>
    </div>
  </main>

  <div id="results-overlay" class="overlay">
    <button class="close-btn" id="close-results">✕</button>
    <h2>Quiz Results</h2>
    <table id="results-table">
      <thead>
        <tr>
          <th>Student</th>
          <th>Quiz</th>
          <th>Score</th>
          <th>Date</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div id="new-students-overlay" class="overlay">
    <button class="close-btn" id="close-new-students">✕</button>
    <h2>New Inquiries</h2>
    <table id="new-students-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Phone</th>
          <th>Requested Level</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <button class="action-btn" style="background: var(--danger); color: white;" onclick="removeAllStudents()">Clear All Leads</button>
  </div>

  <div id="students-overlay" class="overlay">
    <button class="close-btn" id="close-students">✕</button>
    
    <h2>Beginner</h2>
    <table id="students-beginner"><tbody></tbody></table>

    <h2>Elementary</h2>
    <table id="students-elementary"><tbody></tbody></table>

    <h2>Intermediate</h2>
    <table id="students-intermediate"><tbody></tbody></table>

    <h2>Advanced</h2>
    <table id="students-advanced"><tbody></tbody></table>

    <button class="action-btn" id="save-all-levels">Apply All Changes</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="assets/js/firebase.js"></script>
  <script src="assets/js/admin.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
  
  <title>AngloRoom – Level Test</title>

  <style>
   /* ================= RESPONSIVE ================= */
@media (max-width: 768px) {

html, body {
  overflow-x: hidden;
}

/* Header */
.ar-header {
  width: calc(100% - 24px);
  margin: 12px auto;
  padding: 12px 16px;
  border-radius: 18px;
  top: 0;
  flex-direction: column;
  gap: 12px;
}

.ar-logo {
  font-size: 22px;
  text-align: center;
}

.lang-switch {
  width: 100%;
  justify-content: center;
  flex-wrap: wrap;
}

.lang-switch button {
  flex: 1;
  min-width: 80px;
  padding: 10px;
  font-size: 13px;
}

/* Hero */
.ar-hero {
  padding: 40px 16px 20px;
}

.ar-hero h1 {
  font-size: 30px;
  line-height: 1.2;
}

.ar-hero p {
  font-size: 15px;
  line-height: 1.5;
}

/* Quiz Section */
.quiz-section {
  padding: 0 14px;
}

.task-card {
  padding: 18px;
  border-radius: 18px;
  margin-bottom: 18px;
}

.task-card h3 {
  font-size: 18px;
  line-height: 1.4;
}

.task-card p {
  font-size: 14px;
}

.task-card label {
  font-size: 15px;
  padding: 10px;
}

.task-card input[type="text"] {
  font-size: 16px; /* prevents zoom on iPhone */
  padding: 12px;
  border-radius: 10px;
}

/* Button */
.submit-quiz-btn {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border-radius: 16px;
}

/* Result Card */
.result-card {
  width: calc(100% - 28px);
  padding: 24px 18px;
  border-radius: 22px;
}

.result-card h2 {
  font-size: 24px;
}

.result-card p {
  font-size: 18px;
}

/* Footer */
.ar-footer {
  padding: 40px 16px 24px;
}

.ar-footer h4 {
  font-size: 20px;
}

.ar-footer p {
  font-size: 14px;
}
}

/* Small phones */
@media (max-width: 420px) {

.ar-hero h1 {
  font-size: 26px;
}

.task-card {
  padding: 16px;
}

.task-card h3 {
  font-size: 16px;
}

.submit-quiz-btn {
  font-size: 15px;
}
}
  </style>
</head>
<body>

<header class="ar-header">
  <a class="ar-logo" href="index.html">AngloRoom</a>
  <div class="lang-switch">
    <button onclick="setLang('uz')">UZ</button>
    <button onclick="setLang('ru')">RU</button>
  </div>
</header>

<section class="ar-hero">
  <h1 data-i18n="heroTitle"></h1>
  <p data-i18n="heroDesc"></p>
</section>

<section class="quiz-section" id="quizSection">
  </section>

<div class="result-card" id="resultCard">
  <h2 data-i18n="level"></h2>
  <p id="score"></p>
</div>

<footer class="ar-footer">
  <h4>AngloRoom</h4>
  <p data-i18n="footerDesc"></p>
</footer>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="assets/js/firebase.js"></script>
<script src="assets/js/test.js"></script>
</body>
</html>

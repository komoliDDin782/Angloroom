<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>AngloRoom - Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <script src="assets/js/firebase.js" defer></script>
  <script src="assets/js/profile.js" defer></script>

  <style>
    :root {
      /* Background & Base */
      --bg-base: #022c22;
      --bg-glass: rgba(255, 255, 255, 0.03);
      --bg-glass-hover: rgba(255, 255, 255, 0.05);
      --bg-glass-active: rgba(255, 255, 255, 0.06);
      --bg-glass-strong: rgba(255, 255, 255, 0.08);
      
      /* Accent */
      --accent: #10b981;
      --accent-hover: #059669;
      --accent-glow: rgba(16, 185, 129, 0.4);
      --accent-bg: rgba(16, 185, 129, 0.08);
      --accent-bg-hover: rgba(16, 185, 129, 0.1);
      --accent-shadow: rgba(16, 185, 129, 0.1);
      
      /* Text */
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --text-on-accent: #000;
      --text-on-accent-hover: #fff;
      
      /* Borders */
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-border-light: rgba(255, 255, 255, 0.12);
      --glass-border-medium: rgba(255, 255, 255, 0.14);
      --glass-border-strong: rgba(255, 255, 255, 0.2);
      --border-dashed: rgba(255, 255, 255, 0.2);
      
      /* Shadows */
      --shadow-card: 0 25px 50px rgba(0, 0, 0, 0.3);
      --shadow-profile-pic: 0 10px 25px rgba(0, 0, 0, 0.5);
      --shadow-toast: 0 10px 30px rgba(0, 0, 0, 0.4);
      --shadow-save-btn: 0 4px 15px var(--accent-glow);
      
      /* Scrollbar */
      --scrollbar-track: rgba(255, 255, 255, 0.03);
      --scrollbar-thumb: rgba(16, 185, 129, 0.3);
      --scrollbar-thumb-hover: rgba(16, 185, 129, 0.5);
      
      /* Level Progress */
      --level-inactive: rgba(255, 255, 255, 0.1);
      
      /* Stats */
      --stat-bg: rgba(255, 255, 255, 0.06);
      
      /* Settings Trigger */
      --settings-bg: rgba(0, 0, 0, 0.4);
      --settings-border: rgba(255, 255, 255, 0.2);
      --settings-icon: rgba(255, 255, 255, 0.9);
      
      /* Logout */
      --logout-color: #ef4444;
      --logout-border: rgba(239, 68, 68, 0.3);
      --logout-bg-hover: rgba(239, 68, 68, 0.1);
      --logout-close-bg-hover: rgba(239, 68, 68, 0.2);
      
      /* Toast */
      --toast-error-bg: #ef4444;
      --toast-error-text: #fff;
      
      /* Header */
      --header-bg: rgba(2, 44, 34, 0.85);
      
      /* Gradient Text */
      --gradient-text-start: #fff;
      
      /* Body Glow */
      --body-glow-color: rgba(16, 185, 129, 0.1);
      
      /* Typography */
      --font-primary: 'Plus Jakarta Sans', sans-serif;
      --font-display: 'Outfit', sans-serif;
      
      /* Sizing */
      --card-radius: 24px;
      --card-radius-small: 20px;
      --btn-radius: 12px;
      --input-radius: 12px;
      --stat-radius: 20px;
      --about-radius: 18px;
      --toast-radius: 12px;
      --scrollbar-radius: 10px;
      --level-step-radius: 4px;
      --settings-radius: 50%;
      --back-close-radius: 50%;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ===== MODERN SCROLLBAR ===== */
    * {
      scrollbar-width: thin;
      scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
    }

    *::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    *::-webkit-scrollbar-track {
      background: var(--scrollbar-track);
      border-radius: var(--scrollbar-radius);
    }

    *::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb);
      border-radius: var(--scrollbar-radius);
      transition: background 0.3s ease;
    }

    *::-webkit-scrollbar-thumb:hover {
      background: var(--scrollbar-thumb-hover);
    }

    /* For Firefox */
    html {
      scrollbar-width: thin;
      scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
    }

    body {
      min-height: 100vh;
      font-family: var(--font-primary);
      background-color: var(--bg-base);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    body::before {
      content: '';
      position: fixed;
      top: -10%;
      left: -10%;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, var(--body-glow-color) 0%, transparent 70%);
      filter: blur(100px);
      z-index: -1;
    }

    /* ===== NAVIGATION ===== */
    header {
      padding: 20px;
      display: flex;
      justify-content: center;
      background: var(--header-bg);
      backdrop-filter: blur(15px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--glass-border);
    }

    nav {
      display: flex;
      gap: clamp(15px, 4vw, 30px);
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: 0.3s;
    }

    nav a:hover,
    nav a[href="profile.html"] {
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent-glow);
    }

    h1 {
      font-family: var(--font-display);
      text-align: center;
      font-size: clamp(32px, 8vw, 42px);
      margin: 40px 20px 20px;
      background: linear-gradient(135deg, var(--gradient-text-start), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ===== 3D FLIP CARD CONTAINER ===== */
    .flip-container {
      width: 90%;
      max-width: 650px;
      margin: 20px auto 60px;
      perspective: 1200px;
      transform: scale(0.85);
      transform-origin: top center;
    }

    .flipper {
      position: relative;
      width: 100%;
      transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      transform-style: preserve-3d;
    }

    .flipper.flipped {
      transform: rotateY(180deg);
    }

    /* ===== FRONT & BACK COMMON STYLES ===== */
    .card-front,
    .card-back {
      width: 100%;
      background: var(--bg-glass);
      backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border);
      border-radius: var(--card-radius);
      box-shadow: var(--shadow-card);
      text-align: center;
    }

    .card-front {
      position: relative;
      overflow: hidden;
      backface-visibility: hidden;
      animation: fadeUp 0.8s ease-out;
    }

    .card-back {
      position: absolute;
      top: 0;
      left: 0;
      backface-visibility: hidden;
      transform: rotateY(180deg);
      overflow: hidden;
    }

    /* Back card scrollbar */
    .card-back {
      scrollbar-width: thin;
      scrollbar-color: var(--scrollbar-thumb) transparent;
    }

    .card-back::-webkit-scrollbar {
      width: 5px;
    }

    .card-back::-webkit-scrollbar-track {
      background: transparent;
      border-radius: var(--scrollbar-radius);
    }

    .card-back::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb);
      border-radius: var(--scrollbar-radius);
    }

    .card-back::-webkit-scrollbar-thumb:hover {
      background: var(--scrollbar-thumb-hover);
    }

    /* Back card inner wrapper for scrolling */
    .card-back-scroll {
      height: 100%;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--scrollbar-thumb) transparent;
    }

    .card-back-scroll::-webkit-scrollbar {
      width: 5px;
    }

    .card-back-scroll::-webkit-scrollbar-track {
      background: transparent;
      border-radius: var(--scrollbar-radius);
    }

    .card-back-scroll::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb);
      border-radius: var(--scrollbar-radius);
    }

    .card-back-scroll::-webkit-scrollbar-thumb:hover {
      background: var(--scrollbar-thumb-hover);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== FRONT CARD STYLES ===== */
    .profile-top-bg {
      height: 200px;
      background-size: cover;
      background-position: center;
      position: relative;
      border-bottom: 1px solid var(--glass-border);
    }

    #profile-pic {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      object-fit: cover;
      border: 6px solid var(--bg-base);
      position: absolute;
      bottom: -80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-base);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: var(--shadow-profile-pic);
      z-index: 2;
    }

    #profile-pic:hover {
      transform: translateX(-50%) scale(1.08);
      border-color: var(--accent);
    }

    .settings-trigger {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      border-radius: var(--settings-radius);
      background: var(--settings-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--settings-border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      transition: all 0.3s;
    }

    .settings-trigger i {
      font-size: 20px;
      color: var(--settings-icon);
      transition: transform 0.3s;
    }

    .settings-trigger:hover {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .settings-trigger:hover i {
      transform: rotate(90deg);
    }

    .profile-bottom {
      padding: 100px 25px 50px;
    }

    #nickname-display {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .user-level {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 24px;
      letter-spacing: 1px;
    }

    /* ===== LEVEL PROGRESS ===== */
    .level-progress {
      width: 100%;
      max-width: 400px;
      height: 8px;
      margin: 0 auto 30px;
      display: flex;
      gap: 8px;
    }

    .level-step {
      flex: 1;
      border-radius: var(--level-step-radius);
      background: var(--level-inactive);
      transition: background 0.4s ease, box-shadow 0.4s ease;
    }

    .level-step.active.beginner,
    .level-step.active.elementary,
    .level-step.active.intermediate,
    .level-step.active.advanced {
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    /* ===== STATS GRID ===== */
    .stats-grid {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin: 24px auto 32px;
      max-width: 640px;
    }

    .stat-card {
      min-width: 100px;
      flex: 1 1 100px;
      padding: 18px 16px;
      border-radius: var(--stat-radius);
      background: var(--stat-bg);
      border: 1px solid var(--glass-border-light);
      text-align: center;
    }

    .stat-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stat-value {
      font-family: var(--font-display);
      font-size: 30px;
      font-weight: 800;
      color: var(--text-main);
    }

    #about-display {
      min-height: 120px;
      padding: 18px 20px;
      border-radius: var(--about-radius);
      background: var(--bg-glass-hover);
      border: 1px solid var(--glass-border-light);
      color: var(--text-main);
      font-size: 15px;
      line-height: 1.7;
      white-space: pre-wrap;
      text-align: left;
      max-width: 600px;
      margin: 0 auto;
    }

    /* ===== BACK CARD STYLES ===== */
    .card-back-inner {
      padding: 40px 30px;
    }

    .back-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 35px;
    }

    .back-header h2 {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
    }

    .back-close-btn {
      width: 40px;
      height: 40px;
      border-radius: var(--back-close-radius);
      background: var(--bg-glass-strong);
      border: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s;
      color: var(--text-main);
      font-size: 18px;
    }

    .back-close-btn:hover {
      background: var(--logout-close-bg-hover);
      border-color: var(--logout-color);
      color: var(--logout-color);
    }

    .setting-group {
      margin-bottom: 28px;
      text-align: left;
    }

    .setting-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .setting-group input[type="text"],
    .setting-group textarea {
      width: 100%;
      padding: 14px 16px;
      border-radius: var(--input-radius);
      border: 1px solid var(--glass-border-medium);
      background: var(--bg-glass-active);
      color: var(--text-main);
      font-family: var(--font-primary);
      font-size: 15px;
      outline: none;
      transition: all 0.3s;
    }

    .setting-group input[type="text"]:focus,
    .setting-group textarea:focus {
      border-color: var(--accent);
      background: var(--accent-bg);
      box-shadow: 0 0 0 3px var(--accent-shadow);
    }

    .setting-group textarea {
      min-height: 100px;
      resize: vertical;
    }

    .image-upload-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .upload-btn {
      flex: 1;
      min-width: 150px;
      padding: 14px 20px;
      border-radius: var(--btn-radius);
      background: var(--bg-glass-active);
      border: 1px dashed var(--border-dashed);
      color: var(--text-main);
      cursor: pointer;
      font-family: var(--font-primary);
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-align: center;
    }

    .upload-btn:hover {
      background: var(--accent-bg-hover);
      border-color: var(--accent);
      color: var(--accent);
    }

    .back-save-btn {
      width: 100%;
      padding: 16px;
      border-radius: var(--btn-radius);
      border: none;
      cursor: pointer;
      font-family: var(--font-primary);
      font-weight: 700;
      font-size: 16px;
      background: var(--accent);
      color: var(--text-on-accent);
      transition: all 0.3s;
      box-shadow: var(--shadow-save-btn);
      margin-top: 10px;
    }

    .back-save-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      color: var(--text-on-accent-hover);
    }

    .back-save-btn:active {
      transform: translateY(0);
    }

    .back-save-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .logout-section {
      margin-top: 30px;
      padding-top: 25px;
      border-top: 1px solid var(--glass-border);
      text-align: center;
    }

    .logout-btn-back {
      padding: 12px 30px;
      border-radius: var(--btn-radius);
      background: transparent;
      border: 1px solid var(--logout-border);
      color: var(--logout-color);
      cursor: pointer;
      font-family: var(--font-primary);
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .logout-btn-back:hover {
      background: var(--logout-bg-hover);
      border-color: var(--logout-color);
    }

    /* ===== TOAST NOTIFICATION ===== */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: var(--text-on-accent);
      padding: 14px 28px;
      border-radius: var(--toast-radius);
      font-weight: 600;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 999;
      pointer-events: none;
      box-shadow: var(--shadow-toast);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-5px);
    }

    .toast.error {
      background: var(--toast-error-bg);
      color: var(--toast-error-text);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 760px) {
      header { padding: 14px 12px; }
      nav { gap: 14px; flex-wrap: wrap; justify-content: center; }
      nav a { font-size: 13px; }

      .flip-container { 
        width: 95%; 
        margin: 16px auto 40px; 
        transform: scale(0.9);
      }
      .profile-top-bg { height: 160px; }
      #profile-pic { width: 140px; height: 140px; bottom: -70px; }
      .settings-trigger { top: 16px; right: 16px; width: 38px; height: 38px; }
      .settings-trigger i { font-size: 18px; }
      .profile-bottom { padding: 90px 18px 36px; }
      #nickname-display { font-size: 28px; }
      .card-back-inner { padding: 30px 20px; }
      .back-header h2 { font-size: 20px; }
    }

    @media (max-width: 520px) {
      h1 { margin: 28px 16px 14px; }
      header { padding: 12px 10px; }
      nav { gap: 10px; }
      .flip-container { 
        width: 100%; 
        margin: 14px auto 30px; 
        transform: scale(0.85);
      }
      .card-front, .card-back { border-radius: var(--card-radius-small); }
      .profile-top-bg { height: 140px; }
      #profile-pic { width: 120px; height: 120px; bottom: -60px; }
      .settings-trigger { top: 14px; right: 14px; width: 34px; height: 34px; }
      .settings-trigger i { font-size: 16px; }
      .profile-bottom { padding: 80px 16px 28px; }
      #nickname-display { font-size: 24px; }
      .card-back-inner { padding: 24px 16px; }
      .back-header h2 { font-size: 18px; }
      .image-upload-group { flex-direction: column; }
    }
  </style>
</head>

<body>

  <header>
    <nav>
      <a href="main.html">Main</a>
      <a href="quiz.html">Quizzes</a>
      <a href="results.html">Results</a>
      <a href="profile.html">Profile</a>
      <a href="chat.html">Chat</a>
    </nav>
  </header>

  <h1>Profile</h1>

  <!-- ===== FLIP CARD CONTAINER ===== -->
  <div class="flip-container">
    <div class="flipper" id="flipper">

      <!-- ========== FRONT CARD ========== -->
      <div class="card-front">
        <div class="profile-top-bg" id="profile-top-bg">
          <img id="profile-pic" src="assets/image/logo.jpg" alt="Profile Picture">

          <div class="settings-trigger" id="flip-to-back-btn">
            <i class="fas fa-ellipsis-v"></i>
          </div>
        </div>

        <div class="profile-bottom">
          <h2 id="nickname-display">Student</h2>
          <p id="level-display" class="user-level">Level: —</p>

          <div class="level-progress">
            <div class="level-step"></div>
            <div class="level-step"></div>
            <div class="level-step"></div>
            <div class="level-step"></div>
          </div>

          <div class="stats-grid">
            <div class="stat-card">
              <p class="stat-label">🎓 Quizzes</p>
              <p class="stat-value" id="quiz-count">0</p>
            </div>
            <div class="stat-card">
              <p class="stat-label">✅ Correct Answers</p>
              <p class="stat-value" id="correct-answers-count">0</p>
            </div>
            <div class="stat-card">
              <p class="stat-label">⚡ Lightning</p>
              <p class="stat-value" id="lightning-count">0</p>
            </div>
          </div>

          <p id="about-display">Tell something about yourself.</p>
        </div>
      </div>

      <!-- ========== BACK CARD (SETTINGS) ========== -->
      <div class="card-back">
        <div class="card-back-scroll">
          <div class="card-back-inner">
            <div class="back-header">
              <h2>⚙️ Settings</h2>
              <button class="back-close-btn" id="flip-to-front-btn">
                <i class="fas fa-times"></i>
              </button>
            </div>

            <div class="setting-group">
              <label for="nickname-input">Nickname</label>
              <input type="text" id="nickname-input" placeholder="Enter your nickname">
            </div>

            <div class="setting-group">
              <label>Profile Picture</label>
              <div class="image-upload-group">
                <label class="upload-btn" for="profile-pic-input">
                  <i class="fas fa-camera"></i> Choose Picture
                </label>
                <input type="file" id="profile-pic-input" accept="image/*" hidden>
              </div>
            </div>

            <div class="setting-group">
              <label>Background Image</label>
              <div class="image-upload-group">
                <label class="upload-btn" for="bg-pic-input">
                  <i class="fas fa-image"></i> Choose Background
                </label>
                <input type="file" id="bg-pic-input" accept="image/*" hidden>
              </div>
            </div>

            <div class="setting-group">
              <label for="about-input">About Me</label>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>AngloRoom - Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <script src="assets/js/firebase.js" defer></script>
  <script src="assets/js/profile.js" defer></script>
  <script src="assets/js/template.js" defer></script>
 
  <link rel="stylesheet" href="assets/css/global.css">
</head>

<body>

  <header>
    <nav>
      <a href="main.html">Main</a>
      <a href="quiz.html">Quizzes</a>
      <a href="results.html">Results</a>
      <a href="profile.html" class="active">Profile</a>
      <a href="chat.html">Chat</a>
    </nav>
  </header>

  <h1>Profile</h1>

  <!-- ===== FLIP CARD CONTAINER ===== -->
  <div class="flip-container">
    <div class="flipper" id="flipper">

      <!-- ========== FRONT CARD ========== -->
      <div class="card-front">
        <div class="profile-top-bg" id="profile-top-bg">
          <img id="profile-pic" src="assets/image/logo.jpg" alt="Profile Picture">

          <div class="settings-trigger" id="flip-to-back-btn">
            <i class="fas fa-ellipsis-v"></i>
          </div>
        </div>

        <div class="profile-bottom">
          <h2 id="nickname-display">Student</h2>
          <p id="level-display" class="user-level">Level: —</p>

          <div class="level-progress">
            <div class="level-step"></div>
            <div class="level-step"></div>
            <div class="level-step"></div>
            <div class="level-step"></div>
          </div>

          <div class="stats-grid">
            <div class="stat-card">
              <p class="stat-label">🎓 Quizzes</p>
              <p class="stat-value" id="quiz-count">0</p>
            </div>
            <div class="stat-card">
              <p class="stat-label">✅ Correct Answers</p>
              <p class="stat-value" id="correct-answers-count">0</p>
            </div>
            <div class="stat-card">
              <p class="stat-label">⚡ Lightning</p>
              <p class="stat-value" id="lightning-count">0</p>
            </div>
          </div>

          <p id="about-display">Tell something about yourself.</p>
        </div>
      </div>

      <!-- ========== BACK CARD (SETTINGS) ========== -->
      <div class="card-back">
        <div class="card-back-scroll">
          <div class="card-back-inner">
            <div class="back-header">
              <h2>⚙️ Settings</h2>
              <button class="back-close-btn" id="flip-to-front-btn">
                <i class="fas fa-times"></i>
              </button>
            </div>

            <div class="setting-group">
              <label for="nickname-input">Nickname</label>
              <input type="text" id="nickname-input" placeholder="Enter your nickname">
            </div>

            <div class="setting-group">
              <label>Profile Picture</label>
              <div class="image-upload-group">
                <label class="upload-btn" for="profile-pic-input">
                  <i class="fas fa-camera"></i> Choose Picture
                </label>
                <input type="file" id="profile-pic-input" accept="image/*" hidden>
              </div>
            </div>

            <div class="setting-group">
              <label>Background Image</label>
              <div class="image-upload-group">
                <label class="upload-btn" for="bg-pic-input">
                  <i class="fas fa-image"></i> Choose Background
                </label>
                <input type="file" id="bg-pic-input" accept="image/*" hidden>
              </div>
            </div>

            <!-- ===== TEMPLATE SELECTOR (MOVED TO SETTINGS) ===== -->
            <div class="setting-group">
              <label>Theme</label>
              <div class="template-selector" id="template-selector">
                <div class="template-option-wrapper">
                  <div class="template-option active" data-template="emerald" title="Emerald">
                    <div class="preview-dot" style="background: linear-gradient(135deg, #022c22, #10b981);"></div>
                  </div>
                  <span class="template-label">🌿 Emerald</span>
                </div>
                
                <div class="template-option-wrapper">
                  <div class="template-option" data-template="ocean" title="Ocean">
                    <div class="preview-dot" style="background: linear-gradient(135deg, #0c1a2b, #0ea5e9);"></div>
                  </div>
                  <span class="template-label">🌊 Ocean</span>
                </div>
                
                <div class="template-option-wrapper">
                  <div class="template-option" data-template="sunset" title="Sunset">
                    <div class="preview-dot" style="background: linear-gradient(135deg, #2d1b0e, #f97316);"></div>
                  </div>
                  <span class="template-label">🌅 Sunset</span>
                </div>
                
                <div class="template-option-wrapper">
                  <div class="template-option" data-template="midnight" title="Midnight">
                    <div class="preview-dot" style="background: linear-gradient(135deg, #1a1025, #8b5cf6);"></div>
                  </div>
                  <span class="template-label">🌙 Midnight</span>
                </div>
                
                <div class="template-option-wrapper">
                  <div class="template-option" data-template="sakura" title="Sakura">
                    <div class="preview-dot" style="background: linear-gradient(135deg, #2d1424, #ec4899);"></div>
                  </div>
                  <span class="template-label">🌸 Sakura</span>
                </div>
              </div>
            </div>

            <div class="setting-group">
              <label for="about-input">About Me</label>
              <textarea id="about-input" rows="4" placeholder="Tell something about yourself..."></textarea>
            </div>

            <button class="back-save-btn" id="save-settings-btn">
              <i class="fas fa-check"></i> Save Changes
            </button>

            <div class="logout-section">
              <button class="logout-btn-back" id="logout-btn">
                <i class="fas fa-sign-out-alt"></i> Log Out
              </button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

</body>
</html>
